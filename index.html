<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valor CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#F3F4F6;color:#1F2937;font-size:14px;}

/* LOGIN */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#F9FAFB;z-index:999;}
.login-box{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:2.5rem;width:360px;box-shadow:0 4px 12px rgba(0,0,0,.08);}
.login-brand{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:2rem;}
.login-brand-dot{width:10px;height:10px;background:#2563EB;border-radius:50%;}
.login-brand-name{font-size:16px;font-weight:600;color:#111827;}
.login-title{font-size:22px;font-weight:600;text-align:center;margin-bottom:.25rem;}
.login-sub{font-size:13px;color:#6B7280;text-align:center;margin-bottom:1.75rem;}
.lbl{display:block;font-size:12px;font-weight:500;color:#4B5563;margin-bottom:5px;}
.inp{display:block;width:100%;border:1px solid #D1D5DB;border-radius:8px;padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:#111827;background:#fff;outline:none;transition:border .15s;}
.inp:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.fw{margin-bottom:14px;}
.login-btn{width:100%;background:#2563EB;color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:4px;}
.login-btn:hover{background:#1D4ED8;}
.login-err{font-size:12px;color:#DC2626;text-align:center;margin-top:10px;min-height:18px;}

/* APP SHELL */
#app{display:none;flex-direction:column;height:100vh;}
.app-body{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:220px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;transition:width .2s;flex-shrink:0;overflow:hidden;}
.sidebar.collapsed{width:52px;}
.sb-top{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem;border-bottom:1px solid #F3F4F6;min-height:52px;}
.sb-logo{display:flex;align-items:center;gap:8px;overflow:hidden;white-space:nowrap;}
.sb-dot{width:8px;height:8px;background:#2563EB;border-radius:50%;flex-shrink:0;}
.sb-name{font-size:14px;font-weight:600;color:#111827;transition:opacity .15s;}
.sidebar.collapsed .sb-name{opacity:0;pointer-events:none;}
.sb-toggle{background:transparent;border:none;cursor:pointer;color:#9CA3AF;padding:4px;border-radius:6px;display:flex;align-items:center;font-size:16px;flex-shrink:0;}
.sb-toggle:hover{background:#F3F4F6;color:#374151;}
.sb-menu{flex:1;padding:.5rem 0;}
.sb-item{display:flex;align-items:center;gap:10px;padding:.625rem 1rem;cursor:pointer;color:#6B7280;font-size:13px;font-weight:500;border-radius:0;transition:all .12s;white-space:nowrap;border:none;background:transparent;width:100%;font-family:'DM Sans',sans-serif;}
.sb-item:hover{background:#F9FAFB;color:#374151;}
.sb-item.active{background:#EFF6FF;color:#2563EB;font-weight:600;}
.sb-item i{font-size:18px;flex-shrink:0;}
.sb-item span{overflow:hidden;transition:opacity .15s;}
.sidebar.collapsed .sb-item span{opacity:0;pointer-events:none;}
.sb-badge{background:#DC2626;color:#fff;border-radius:999px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:auto;flex-shrink:0;}
.sidebar.collapsed .sb-badge{display:none;}
.sb-bottom{padding:.75rem;border-top:1px solid #F3F4F6;}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 1.5rem;display:flex;align-items:center;gap:12px;height:52px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.hpage{font-size:14px;color:#6B7280;}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px;}
.upill{display:flex;align-items:center;gap:7px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:999px;padding:4px 12px 4px 4px;}
.uav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;}
.unm{font-size:13px;font-weight:500;color:#374151;}
.atag{background:#FFFBEB;color:#D97706;font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;border:1px solid #FDE68A;}
.vtabs{display:flex;background:#F3F4F6;border-radius:999px;padding:3px;gap:2px;}
.vtab{padding:3px 11px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#6B7280;font-family:'DM Sans',sans-serif;}
.vtab.active{background:#fff;color:#111827;box-shadow:0 1px 2px rgba(0,0,0,.08);}
.ibtn{border:1px solid #E5E7EB;background:#fff;padding:5px 10px;border-radius:8px;font-size:13px;cursor:pointer;color:#6B7280;display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;}
.ibtn:hover{background:#F9FAFB;color:#374151;}
.bnew{background:#2563EB;color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;}
.bnew:hover{background:#1D4ED8;}

/* MAIN CONTENT */
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* METRICS */
.mbar{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:.75rem 1.25rem;background:#fff;border-bottom:1px solid #E5E7EB;flex-shrink:0;transition:all .2s;}
.mbar.collapsed{padding:0;height:0;overflow:hidden;border-bottom:none;}
.metrics-toggle{display:flex;align-items:center;justify-content:center;background:#fff;border-bottom:1px solid #E5E7EB;padding:3px;flex-shrink:0;}
.metrics-toggle-btn{background:transparent;border:none;cursor:pointer;color:#9CA3AF;padding:2px 8px;border-radius:4px;font-size:13px;display:flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;font-size:11px;}
.metrics-toggle-btn:hover{color:#374151;}
.mc{background:#F9FAFB;border:1px solid #F3F4F6;border-radius:8px;padding:.7rem .9rem;}
.mlbl{font-size:10px;font-weight:600;color:#9CA3AF;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
.mval{font-size:19px;font-weight:600;color:#111827;}
.msub{font-size:11px;color:#9CA3AF;margin-top:2px;}

/* BOARD */
.board{display:flex;overflow-x:auto;flex:1;}
.board::-webkit-scrollbar{height:6px;}
.board::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px;}
.col{min-width:238px;max-width:238px;display:flex;flex-direction:column;border-right:1px solid #E5E7EB;background:#F9FAFB;}
.cacc{height:3px;flex-shrink:0;}
.chdr{padding:.7rem .9rem;border-bottom:1px solid #E5E7EB;background:#fff;flex-shrink:0;}
.ctr{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.cnm{font-size:13px;font-weight:600;color:#374151;}
.cct{background:#F3F4F6;border:1px solid #E5E7EB;border-radius:999px;font-size:11px;padding:1px 7px;color:#6B7280;font-weight:500;}
.cst{font-size:11px;color:#9CA3AF;}
.carea{flex:1;padding:.7rem;display:flex;flex-direction:column;gap:7px;overflow-y:auto;}
.ecol{border:1.5px dashed #E5E7EB;border-radius:8px;padding:1.25rem 1rem;text-align:center;color:#9CA3AF;font-size:12px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
.caddbtn{margin:0 .7rem .7rem;padding:7px;border:1px dashed #D1D5DB;border-radius:8px;background:transparent;cursor:pointer;font-size:12px;color:#9CA3AF;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'DM Sans',sans-serif;}
.caddbtn:hover{background:#fff;color:#6B7280;}
.addcol-wrap{min-width:56px;display:flex;align-items:flex-start;padding:.7rem .4rem;border-right:1px solid #E5E7EB;}
.addcol-btn{background:#fff;border:1px dashed #D1D5DB;border-radius:8px;padding:8px 6px;cursor:pointer;font-size:11px;color:#9CA3AF;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;height:68px;justify-content:center;width:100%;}
.addcol-btn:hover{border-color:#2563EB;color:#2563EB;}
.cedit-btn{background:transparent;border:none;cursor:pointer;color:#D1D5DB;padding:2px 3px;display:flex;align-items:center;font-size:13px;}
.cedit-btn:hover{color:#6B7280;}

/* CARDS */
.card{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:.7rem;cursor:pointer;position:relative;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.card:hover{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.07);}
.card.dragging{opacity:.35;}
.col.drag-over .carea{background:#EFF6FF;border-radius:8px;}
.card-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:8px 0 0 8px;}
.card-name{font-size:13px;font-weight:600;color:#111827;margin-left:10px;margin-bottom:1px;}
.card-deal{font-size:11px;font-weight:500;color:#2563EB;margin-left:10px;margin-bottom:2px;}
.card-prod{font-size:11px;color:#9CA3AF;margin-left:10px;margin-bottom:6px;}
.card-val{font-size:13px;font-weight:600;color:#374151;margin-left:10px;}
.card-comm{font-size:11px;color:#059669;margin-left:10px;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.cpill{background:#ECFDF5;color:#059669;border-radius:999px;padding:1px 6px;font-size:10px;font-weight:600;border:1px solid #A7F3D0;}
.card-foot{display:flex;align-items:center;margin-left:10px;gap:5px;margin-top:5px;}
.pbar-wrap{flex:1;}
.pbar{height:3px;background:#F3F4F6;border-radius:999px;overflow:hidden;margin-bottom:2px;}
.pfill{height:100%;border-radius:999px;}
.ptxt{font-size:10px;color:#9CA3AF;}
.oav{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}
.mention-tag{background:#F5F3FF;color:#7C3AED;border-radius:999px;padding:1px 6px;font-size:10px;font-weight:600;margin-left:10px;display:inline-block;margin-bottom:2px;}
.task-due-tag{background:#FFF7ED;color:#EA580C;border-radius:999px;padding:1px 6px;font-size:10px;font-weight:500;margin-left:10px;display:inline-block;margin-bottom:2px;}

/* TASKS PAGE */
.tasks-page{flex:1;display:none;flex-direction:column;overflow:hidden;}
.tasks-page.visible{display:flex;}
.tasks-header{padding:1rem 1.5rem;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tasks-title{font-size:16px;font-weight:600;color:#111827;}
.task-tabs{display:flex;background:#F3F4F6;border-radius:999px;padding:3px;gap:2px;margin:.875rem 1.25rem 0;flex-shrink:0;}
.task-tab{padding:6px 18px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#6B7280;font-family:'DM Sans',sans-serif;}
.task-tab.active{background:#fff;color:#111827;box-shadow:0 1px 2px rgba(0,0,0,.08);}
.tasks-body{flex:1;overflow-y:auto;padding:1rem 1.25rem;}
.task-list-wrap{display:flex;flex-direction:column;gap:8px;}
.task-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:.875rem 1rem;display:flex;align-items:flex-start;gap:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.task-circle{width:22px;height:22px;border-radius:50%;border:2px solid #D1D5DB;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;margin-top:1px;}
.task-circle.done{background:#2563EB;border-color:#2563EB;color:#fff;}
.task-circle.inprogress{background:#F59E0B;border-color:#F59E0B;color:#fff;}
/* TAGS */
.tag-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:600;margin-left:10px;margin-bottom:3px;}
.tag-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.tags-wrap{display:flex;flex-wrap:wrap;gap:3px;margin-left:10px;margin-bottom:3px;}
.task-info{flex:1;}
.task-card-name{font-size:13px;font-weight:600;color:#111827;margin-bottom:2px;}
.task-card-name.done{text-decoration:line-through;opacity:.45;}
.task-card-desc{font-size:12px;color:#6B7280;margin-bottom:4px;}
.task-card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.task-meta-pill{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500;}
.pill-date{background:#FFF7ED;color:#EA580C;}
.pill-lead{background:#EFF6FF;color:#2563EB;}
.pill-done{background:#ECFDF5;color:#059669;}
.pill-prog{background:#FFFBEB;color:#D97706;}
.task-actions{display:flex;gap:4px;flex-shrink:0;}
.task-act-btn{background:transparent;border:1px solid #E5E7EB;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px;color:#6B7280;font-family:'DM Sans',sans-serif;}
.task-act-btn:hover{background:#F9FAFB;}
.empty-tasks{text-align:center;padding:3rem;color:#9CA3AF;font-size:13px;}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(17,24,39,.45);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding:1.5rem 1rem;overflow-y:auto;}
.modal{background:#fff;border-radius:12px;width:100%;border:1px solid #E5E7EB;box-shadow:0 20px 40px rgba(0,0,0,.12);}
.modal-lg{max-width:860px;}
.modal-md{max-width:500px;}
.modal-sm{max-width:400px;}
.modal-hdr{padding:1.1rem 1.4rem;border-bottom:1px solid #F3F4F6;display:flex;align-items:flex-start;gap:14px;}
.modal-av{width:46px;height:46px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;}
.modal-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;background:#EFF6FF;color:#2563EB;}
.modal-title{font-size:18px;font-weight:600;color:#111827;}
.modal-sub{font-size:12px;color:#9CA3AF;margin-top:2px;}
.modal-close{margin-left:auto;background:transparent;border:1px solid #E5E7EB;cursor:pointer;color:#9CA3AF;padding:5px 6px;border-radius:6px;line-height:1;font-size:16px;}
.modal-close:hover{background:#F9FAFB;color:#374151;}
.modal-acts{padding:.7rem 1.4rem;border-bottom:1px solid #F3F4F6;display:flex;gap:8px;align-items:center;background:#F9FAFB;flex-wrap:wrap;}
.modal-body{display:grid;grid-template-columns:1fr 1fr;}
.modal-left{padding:1.1rem 1.4rem;border-right:1px solid #F3F4F6;overflow-y:auto;max-height:64vh;}
.modal-right{padding:1.1rem 1.4rem;overflow-y:auto;max-height:64vh;}
.modal-foot{padding:.875rem 1.4rem;border-top:1px solid #F3F4F6;background:#F9FAFB;border-radius:0 0 12px 12px;}
.modal-body-pad{padding:1.1rem 1.4rem;}
.sec-lbl{font-size:11px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.7rem;display:flex;align-items:center;gap:5px;}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.1rem;}
.df{border:1px solid #E5E7EB;border-radius:8px;padding:9px 11px;background:#fff;}
.df.full{grid-column:1/-1;}
.df-lbl{font-size:10px;font-weight:600;color:#9CA3AF;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.df-inp{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:#111827;outline:none;font-family:'DM Sans',sans-serif;}
.df-sel{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:#111827;outline:none;font-family:'DM Sans',sans-serif;cursor:pointer;}
.df-ta{width:100%;border:none;background:transparent;font-size:13px;color:#111827;outline:none;font-family:'DM Sans',sans-serif;resize:vertical;min-height:90px;line-height:1.6;}
.ro-banner{background:#FFFBEB;color:#D97706;font-size:12px;padding:8px 1.4rem;border-bottom:1px solid #FDE68A;display:flex;align-items:center;gap:7px;font-weight:500;}
.tpbar{height:5px;background:#F3F4F6;border-radius:999px;overflow:hidden;margin-bottom:3px;}
.tpfill{height:100%;border-radius:999px;}
.t-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.t-item{display:flex;align-items:flex-start;gap:8px;padding:7px 9px;border:1px solid #F3F4F6;border-radius:8px;background:#F9FAFB;}
.t-chk{width:16px;height:16px;border-radius:4px;border:1.5px solid #D1D5DB;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;}
.t-chk.done{background:#2563EB;border-color:#2563EB;color:#fff;}
.t-info{flex:1;}
.t-nm{font-size:12px;color:#374151;font-weight:500;}
.t-due{font-size:11px;color:#EA580C;margin-top:2px;}
.t-del{border:none;background:transparent;cursor:pointer;color:#D1D5DB;padding:2px;}
.t-del:hover{color:#DC2626;}
.add-task-row{display:flex;gap:6px;margin-bottom:6px;}
.at-inp{flex:1;border:1px solid #E5E7EB;border-radius:8px;padding:7px 10px;font-size:12px;font-family:'DM Sans',sans-serif;background:#fff;color:#111827;outline:none;}
.at-inp:focus{border-color:#2563EB;}
.at-btn{padding:7px 12px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.at-date{border:1px solid #E5E7EB;border-radius:8px;padding:7px 10px;font-size:12px;font-family:'DM Sans',sans-serif;background:#fff;color:#111827;outline:none;}
.at-date:focus{border-color:#2563EB;}
.fu-row{display:flex;gap:7px;margin-bottom:.6rem;}
.fu-inp{flex:1;border:1px solid #E5E7EB;border-radius:8px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fff;color:#111827;outline:none;}
.fu-inp:focus{border-color:#2563EB;}
.fu-btn{background:#2563EB;color:#fff;border:none;border-radius:8px;padding:9px 14px;cursor:pointer;font-size:15px;}
.fu-btn:hover{background:#1D4ED8;}
.act-list{display:flex;flex-direction:column;}
.act-item{display:flex;gap:10px;padding:9px 0;position:relative;}
.act-item:not(:last-child)::after{content:'';position:absolute;left:13px;top:33px;bottom:-4px;width:1px;background:#F3F4F6;}
.act-ico{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.ai-move{background:#ECFDF5;color:#059669;}
.ai-msg{background:#EFF6FF;color:#2563EB;}
.ai-info{background:#F3F4F6;color:#6B7280;}
.ai-mention{background:#F5F3FF;color:#7C3AED;}
.ai-link{background:#FFF7ED;color:#EA580C;}
.act-when{font-size:10px;color:#9CA3AF;margin-bottom:1px;}
.act-txt{font-size:12px;color:#374151;font-weight:500;}
.act-by{font-size:10px;color:#9CA3AF;}
.save-btn{width:100%;background:#2563EB;color:#fff;border:none;padding:10px;border-radius:8px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
.save-btn:hover{background:#1D4ED8;}
.del-btn{padding:6px 12px;border:1px solid #FCA5A5;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:#DC2626;display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;}
.del-btn:hover{background:#FEF2F2;}
.stage-sel{border:1px solid #E5E7EB;border-radius:8px;padding:6px 10px;font-size:13px;font-family:'DM Sans',sans-serif;color:#374151;background:#fff;outline:none;cursor:pointer;}
.stage-sel:focus{border-color:#2563EB;}
.mention-check{display:flex;align-items:center;gap:6px;font-size:12px;color:#7C3AED;font-weight:500;cursor:pointer;background:#F5F3FF;padding:5px 12px;border-radius:8px;border:1px solid #DDD6FE;}
.cpicker{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.copt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.copt.sel{border-color:#111827;transform:scale(1.15);}
.loading-ov{position:fixed;inset:0;background:rgba(249,250,251,.92);display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:12px;}
.spin{width:24px;height:24px;border:2px solid #E5E7EB;border-top-color:#2563EB;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{font-size:13px;color:#9CA3AF;}

'use strict';
const JSONBIN_KEY = '$2a$10$OX7tMVxdpb9XDGvwEEcw5e48.cIiEGph4wp5pEojGqv.BdLrj.ifC';
const JSONBIN_URL = 'https://api.jsonbin.io/v3/b';
const BIN_ID = '6a0bb6386610dd3ae8697787';

const USERS = {
  admin:    { pass:'nexur2025', name:'Admin',    role:'admin', color:'#2563EB', bg:'#EFF6FF', init:'A' },
  nalberty: { pass:'nal2025',   name:'Nalberty', role:'user',  color:'#059669', bg:'#ECFDF5', init:'N' }
};
const DEF_COLS = [
  { id:'lead',            name:'Lead',           color:'#F59E0B', fixed:true },
  { id:'contato',         name:'Contato',        color:'#2563EB', fixed:true },
  { id:'cotacao',         name:'Cotação',        color:'#8B5CF6', fixed:true },
  { id:'cotacao_enviada', name:'Cotação Enviada',color:'#059669', fixed:true },
  { id:'follow_up',       name:'Follow Up',      color:'#06B6D4', fixed:true },
  { id:'ganho',           name:'Ganho',          color:'#22C55E', fixed:true, terminal:'won' },
  { id:'perdido',         name:'Perdido',        color:'#EF4444', fixed:true, terminal:'lost' }
];
const DEF_PRODS = ['Automóvel','Residência','Vida','Empresarial','Saúde','Viagem','Outros'];
const INSURANCE_TYPES = ['Novo','Renovação Própria','Renovação Externa'];
const TAG_PALETTE = [
  {name:'Vermelho', bg:'#FEE2E2', color:'#DC2626', dot:'#DC2626'},
  {name:'Laranja',  bg:'#FFEDD5', color:'#EA580C', dot:'#EA580C'},
  {name:'Amarelo',  bg:'#FEF9C3', color:'#CA8A04', dot:'#CA8A04'},
  {name:'Verde',    bg:'#DCFCE7', color:'#16A34A', dot:'#16A34A'},
  {name:'Azul',     bg:'#DBEAFE', color:'#2563EB', dot:'#2563EB'},
  {name:'Roxo',     bg:'#F3E8FF', color:'#9333EA', dot:'#9333EA'},
  {name:'Rosa',     bg:'#FCE7F3', color:'#DB2777', dot:'#DB2777'},
  {name:'Cinza',    bg:'#F3F4F6', color:'#6B7280', dot:'#6B7280'},
];
function getTagColor(colorName){ return TAG_PALETTE.find(c=>c.name===colorName)||TAG_PALETTE[4]; }
const PALETTE = ['#F59E0B','#2563EB','#8B5CF6','#059669','#06B6D4','#EF4444','#EC4899','#64748B','#0EA5E9','#A16207'];

let currentUser=null, currentRole=null, viewFilter='mine', currentPage='pipeline', currentTaskTab='todo';
let allLeads=[], columns=[], notifications=[], closings=[], globalTasks=[], customProds=[], customTags=[];
let selectedColor=PALETTE[0], dragLeadId=null, searchQuery='', autoRefreshTimer=null;

const fmt = n => 'R$ '+Number(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const calcComm = (v,p) => (Number(v)||0)*(Number(p)||0)/100;
const nowStr = () => new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
const dateStr = () => new Date().toLocaleDateString('pt-BR');

function el(tag,cls,txt){ const e=document.createElement(tag); if(cls) e.className=cls; if(txt!==undefined) e.textContent=txt; return e; }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function showLoading(txt='Salvando...'){ document.getElementById('loading-txt').textContent=txt; document.getElementById('loading').style.display='flex'; }
function hideLoading(){ document.getElementById('loading').style.display='none'; }

// ── API ──
async function apiLoad(){
  try{
    const r=await fetch(`${JSONBIN_URL}/${BIN_ID}/latest`,{headers:{'X-Master-Key':JSONBIN_KEY}});
    const d=await r.json();
    return{ leads:d.record?.leads||[], columns:d.record?.columns||DEF_COLS, notifications:d.record?.notifications||[], closings:d.record?.closings||[], globalTasks:d.record?.globalTasks||[], customProds:d.record?.customProds||[], customTags:d.record?.customTags||[] };
  }catch(e){ showToast('Erro ao carregar.'); return{leads:[],columns:DEF_COLS,notifications:[],closings:[],globalTasks:[]}; }
}
async function apiSave(){
  try{
    await fetch(`${JSONBIN_URL}/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},body:JSON.stringify({leads:allLeads,columns,notifications,closings,globalTasks,customProds,customTags})});
  }catch(e){ showToast('Erro ao salvar.'); }
}

// ── AUTH ──
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('l-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
function doLogin(){
  const u=document.getElementById('l-user').value.trim().toLowerCase();
  const p=document.getElementById('l-pass').value;
  const user=USERS[u];
  if(!user||user.pass!==p){ document.getElementById('login-err').textContent='Usuário ou senha incorretos.'; return; }
  currentUser=u; currentRole=user.role; viewFilter=currentRole==='admin'?'all':'mine';
  document.getElementById('login-err').textContent='';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  const av=document.getElementById('hdr-av'); av.textContent=user.init; av.style.background=user.bg; av.style.color=user.color;
  document.getElementById('hdr-name').textContent=user.name;
  if(currentRole==='admin'){ document.getElementById('hdr-admin').style.display='inline-block'; document.getElementById('view-tabs').style.display='flex'; document.getElementById('sb-config').style.display='flex'; document.getElementById('sb-ferramentas').style.display='flex'; document.getElementById('view-select').value=viewFilter; }
  if(autoRefreshTimer) clearInterval(autoRefreshTimer);
  loadAndRender().then(()=>{
    autoRefreshTimer=setInterval(async()=>{
      const d=await apiLoad();
      // Só re-renderiza se os dados mudaram
      const newHash=JSON.stringify({leads:d.leads,columns:d.columns,notifications:d.notifications,closings:d.closings,globalTasks:d.globalTasks||[],customProds:d.customProds||[],customTags:d.customTags||[]});
      const oldHash=JSON.stringify({leads:allLeads,columns,notifications,closings,globalTasks,customProds,customTags});
      if(newHash===oldHash) return;
      allLeads=d.leads; columns=d.columns; notifications=d.notifications; closings=d.closings; globalTasks=d.globalTasks||[]; customProds=d.customProds||[]; customTags=d.customTags||[];
      renderAll(); renderNotifDot(); updateTasksBadge();
    },3000);
  });
}
document.getElementById('logout-btn').addEventListener('click',()=>{
  if(autoRefreshTimer){clearInterval(autoRefreshTimer);autoRefreshTimer=null;}
  currentUser=null; currentRole=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('l-pass').value='';
  document.getElementById('hdr-admin').style.display='none';
  document.getElementById('view-tabs').style.display='none';
});

// ── SIDEBAR ──
document.getElementById('sb-toggle').addEventListener('click',()=>{
  const sb=document.getElementById('sidebar');
  const collapsed=sb.classList.toggle('collapsed');
  document.getElementById('sb-toggle').innerHTML=collapsed?'<i class="ti ti-chevron-right"></i>':'<i class="ti ti-chevron-left"></i>';
});
document.getElementById('sidebar').addEventListener('click', e=>{
  const btn=e.target.closest('[data-page]'); if(!btn) return;
  const page=btn.dataset.page;
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  currentPage=page;
  document.getElementById('pipeline-page').style.display=page==='pipeline'?'flex':'none';
  document.getElementById('tasks-page').classList.toggle('visible',page==='tasks');
  document.getElementById('fat-page').classList.toggle('visible',page==='faturamento');
  document.getElementById('config-page').classList.toggle('visible',page==='config');
  document.getElementById('ferramentas-page').classList.toggle('visible',page==='ferramentas');
  document.getElementById('hdr-page').textContent=page==='pipeline'?'Pipeline Comercial':page==='tasks'?'Tarefas':page==='config'?'Configurações':page==='ferramentas'?'Ferramentas IA':'Faturamento';
  document.getElementById('view-tabs').style.display=page==='pipeline'&&currentRole==='admin'?'flex':'none';
  document.getElementById('new-lead-btn').style.display=page==='pipeline'?'flex':'none';
  if(page==='tasks') renderTasksPage();
  if(page==='faturamento') renderFaturamento();
  if(page==='config') renderConfig();
  if(page==='ferramentas') renderFerramentas();
});

// ── VIEW FILTER ──
document.getElementById('view-tabs').addEventListener('change', e=>{
  if(e.target.id!=='view-select') return;
  viewFilter=e.target.value;
  renderAll();
});
function visibleLeads(){
  let leads=[];
  if(currentRole==='admin'){
    if(viewFilter==='mine') leads=allLeads.filter(l=>l.owner==='admin');
    else if(viewFilter==='nalberty') leads=allLeads.filter(l=>l.owner==='nalberty');
    else leads=allLeads;
  } else {
    leads=allLeads.filter(l=>l.owner===currentUser);
  }
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    leads=leads.filter(l=>(l.name||'').toLowerCase().includes(q)||(l.dealName||'').toLowerCase().includes(q)||(l.product||'').toLowerCase().includes(q)||(l.phone||'').toLowerCase().includes(q));
  }
  return leads;
}

// ── LOAD ──
document.getElementById('refresh-btn').addEventListener('click', loadAndRender);

// ── SEARCH ──
document.getElementById('search-btn').addEventListener('click',()=>{
  document.getElementById('search-wrap').style.display='flex';
  document.getElementById('search-btn').style.display='none';
  setTimeout(()=>document.getElementById('search-input').focus(),50);
});
document.getElementById('search-close').addEventListener('click',()=>{
  searchQuery='';
  document.getElementById('search-input').value='';
  document.getElementById('search-wrap').style.display='none';
  document.getElementById('search-btn').style.display='flex';
  renderAll();
});
document.getElementById('search-input').addEventListener('input',e=>{ searchQuery=e.target.value.trim(); renderAll(); });
document.getElementById('search-input').addEventListener('keydown',e=>{ if(e.key==='Escape') document.getElementById('search-close').click(); });
async function loadAndRender(){
  showLoading('Carregando...');
  const d=await apiLoad(); allLeads=d.leads; columns=d.columns; notifications=d.notifications; closings=d.closings; globalTasks=d.globalTasks||[]; customProds=d.customProds||[]; customTags=d.customTags||[];
  hideLoading(); renderAll(); renderNotifDot(); updateTasksBadge();
}

// ── RENDER ──
function renderAll(){ renderMetrics(); renderBoard(); if(currentPage==='tasks') renderTasksPage(); }

function getProds(){ return [...DEF_PRODS, ...customProds]; }

let metricsVisible=true;
function toggleMetrics(){
  metricsVisible=!metricsVisible;
  const bar=document.getElementById('metrics-bar');
  const icon=document.getElementById('metrics-eye-icon');
  const lbl=document.getElementById('metrics-toggle-label');
  bar.classList.toggle('collapsed',!metricsVisible);
  icon.className=metricsVisible?'ti ti-eye':'ti ti-eye-off';
  lbl.textContent=metricsVisible?'Ocultar métricas':'Mostrar métricas';
}

function renderMetrics(){
  const leads=visibleLeads();
  const total=leads.length, totalVal=leads.reduce((s,l)=>s+(Number(l.value)||0),0), totalComm=leads.reduce((s,l)=>s+calcComm(l.value,l.commPct),0);
  const totalRepVend=leads.reduce((s,l)=>s+calcComm(calcComm(l.value,l.commPct),l.repVendPct||0),0);
  const ativos=leads.filter(l=>!columns.find(c=>c.id===l.col)?.terminal).length;
  const ganhos=leads.filter(l=>columns.find(c=>c.id===l.col)?.terminal==='won').length;
  const conv=total>0?Math.round((ganhos/total)*100):0;
  const commLabel=currentRole==='admin'?'Comissão':'Meu Repasse';
  const commVal=currentRole==='admin'?totalComm:totalRepVend;
  const commSub=currentRole==='admin'?'% negociada':'estimativa de ganhos';
  document.getElementById('metrics-bar').innerHTML=`
    <div class="mc"><div class="mlbl">Leads</div><div class="mval">${total}</div><div class="msub">${fmt(totalVal)}</div></div>
    <div class="mc"><div class="mlbl">Valor Total</div><div class="mval">${fmt(totalVal)}</div><div class="msub">em pipeline</div></div>
    <div class="mc"><div class="mlbl">${commLabel}</div><div class="mval" style="color:#059669">${fmt(commVal)}</div><div class="msub">${commSub}</div></div>
    <div class="mc"><div class="mlbl">Ativos</div><div class="mval">${ativos}</div><div class="msub">${total>0?Math.round((ativos/total)*100):0}% do pipeline</div></div>
    <div class="mc"><div class="mlbl">Conversão</div><div class="mval">${conv}%</div><div class="msub">${ganhos} de ${total} convertidos</div></div>`;
}

function renderBoard(){
  const leads=visibleLeads(); const board=document.getElementById('board'); board.innerHTML='';
  columns.forEach(col=>{
    const cl=leads.filter(l=>l.col===col.id);
    const colVal=cl.reduce((s,l)=>s+(Number(l.value)||0),0), colComm=cl.reduce((s,l)=>s+calcComm(l.value,l.commPct),0);
    const colEl=el('div','col'); colEl.dataset.colId=col.id;
    const acc=el('div','cacc'); acc.style.background=col.color; colEl.appendChild(acc);
    const hdr=el('div','chdr'); const tr=el('div','ctr');
    const icon=col.terminal==='won'?'🏆 ':col.terminal==='lost'?'❌ ':'';
    const nm=el('span','cnm',icon+col.name); const acts=el('div','cact'); const cnt=el('span','cct',String(cl.length)); acts.appendChild(cnt);
    if(!col.fixed){
      const eb=el('button','cedit-btn'); eb.innerHTML='<i class="ti ti-pencil"></i>'; eb.addEventListener('click',()=>openEditCol(col.id));
      const db=el('button','cedit-btn'); db.innerHTML='<i class="ti ti-trash"></i>'; db.addEventListener('click',()=>deleteCol(col.id));
      acts.appendChild(eb); acts.appendChild(db);
    }
    tr.appendChild(nm); tr.appendChild(acts); hdr.appendChild(tr);
    hdr.appendChild(el('div','cst',`${fmt(colVal)} · Comissão: ${fmt(colComm)}`)); colEl.appendChild(hdr);
    const area=el('div','carea');
    if(cl.length===0){ const ec=el('div','ecol'); ec.innerHTML='<i class="ti ti-inbox" style="font-size:20px;opacity:.3;"></i><span>Sem leads aqui</span>'; area.appendChild(ec); }
    else cl.forEach(l=>area.appendChild(buildCard(l,col.color)));

    board.appendChild(colEl);

function buildCard(l, accentColor){
  const tasks=l.tasks||[];
  const done=tasks.filter(t=>t.done).length, tot=tasks.length, pct=tot>0?Math.round((done/tot)*100):0;
  const fc=pct>=75?'#22C55E':pct>=40?'#2563EB':'#F59E0B';
  const ow=USERS[l.owner]||USERS.admin;
  const pctD=Number(l.commPct||0).toFixed(1).replace('.0','');
  const upcoming=tasks.filter(t=>!t.done&&t.due).sort((a,b)=>a.due.localeCompare(b.due))[0];
  const card=el('div','card'); card.draggable=true; card.dataset.id=l.id;
  card.addEventListener('dragstart',()=>{dragLeadId=l.id;card.classList.add('dragging');});
  card.addEventListener('dragend',()=>{dragLeadId=null;card.classList.remove('dragging');});
  card.addEventListener('click',()=>openLead(l.id));
  const acc2=el('div','card-accent'); acc2.style.background=accentColor; card.appendChild(acc2);
  card.appendChild(el('div','card-name',l.name));
  if(l.dealName){ card.appendChild(el('div','card-deal',l.dealName)); }
  card.appendChild(el('div','card-prod',(l.insuranceType?`${l.product||'—'} · ${l.insuranceType}`:l.product||'—')));
  if(upcoming){ const dt=el('div','task-due-tag'); dt.innerHTML=`<i class="ti ti-clock" style="font-size:10px;"></i> ${fmtDue(upcoming.due)}`; card.appendChild(dt); }
  // Tags — colored strip on left border
  if(l.tags&&l.tags.length){
    const firstTag=l.tags[0];
    const ct=customTags.find(x=>x.id===firstTag.id)||firstTag;
    const tc=getTagColor(ct.color||firstTag.color);
    card.style.borderLeft=`4px solid ${tc.dot}`;
    // Show all tags as small dots below
    const tw=el('div','tags-wrap');
    l.tags.forEach(tag=>{
      const ctt=customTags.find(x=>x.id===tag.id)||tag;
      const tcc=getTagColor(ctt.color||tag.color);
      const tp=el('div','tag-pill'); tp.style.cssText=`background:${tcc.bg};color:${tcc.color};display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:999px;font-size:9px;font-weight:600;`;
      const dot=el('span'); dot.style.cssText=`width:5px;height:5px;border-radius:50%;background:${tcc.dot};flex-shrink:0;`;
      tp.appendChild(dot); tp.appendChild(document.createTextNode(ctt.name||tag.name));
      tw.appendChild(tp);
    });
    card.appendChild(tw);
  }
  // Value / repasse on card
  const repVend=calcComm(calcComm(l.value,l.commPct),l.repVendPct||0);
  card.appendChild(el('div','card-val',fmt(l.value)));
  if(currentRole==='admin'){
    // Admin: mostra comissão normal + repasse se houver
    const comm=el('div','card-comm'); comm.appendChild(document.createTextNode(fmt(calcComm(l.value,l.commPct))+' ')); comm.appendChild(el('span','cpill',pctD+'%')); card.appendChild(comm);
    if((l.repVendPct||0)>0){
      const repEl=el('div'); repEl.style.cssText='font-size:11px;color:#7C3AED;font-weight:600;margin-left:10px;margin-bottom:4px;';
      repEl.textContent=`Rep. ${fmt(repVend)} (${l.repVendPct}%)`;
      card.appendChild(repEl);
    }
  } else {
    // Nalberty: mostra só repasse dele em roxo
    const repEl=el('div'); repEl.style.cssText='font-size:12px;color:#7C3AED;font-weight:600;margin-left:10px;margin-bottom:4px;';
    repEl.textContent=repVend>0?`Repasse: ${fmt(repVend)} (${l.repVendPct}%)`:'Sem repasse definido';
    card.appendChild(repEl);
  }
  const foot=el('div','card-foot');
  const pw=el('div','pbar-wrap'); const pb=el('div','pbar'); const pf=el('div','pfill'); pf.style.width=pct+'%'; pf.style.background=fc; pb.appendChild(pf); pw.appendChild(pb); pw.appendChild(el('div','ptxt',`${done}/${tot} tarefas`)); foot.appendChild(pw);
  foot.appendChild(el('div','card-pct',pct+'%'));
  const oav=el('div','oav',ow.init); oav.style.background=ow.bg; oav.style.color=ow.color; oav.title=ow.name; foot.appendChild(oav);
  card.appendChild(foot);
  return card;
}

function fmtDue(due){
  if(!due) return '';
  const [datePart, timePart]=due.split('T');
  if(!datePart) return due;
  const [y,m,d]=datePart.split('-');
  return timePart ? `${d}/${m} ${timePart.slice(0,5)}` : `${d}/${m}/${y}`;
}

// ── DRAG DROP ──
async function dropLead(leadId, newColId){
  const l=allLeads.find(x=>x.id===leadId); if(!l||l.col===newColId) return;
  if(!canEdit(l)){showToast('Sem permissão.');return;}
  const col=columns.find(c=>c.id===newColId);
  l.col=newColId; l.activities=l.activities||[];
  l.activities.push({type:'move',text:`Movido para "${col?.name||newColId}"`,by:currentUser,when:`${dateStr()} · ${nowStr()}`});
  if(col?.terminal){
    const entry={leadId:l.id,name:l.name,phone:l.phone||'',product:l.product||'',value:l.value||0,commPct:l.commPct||0,commValue:calcComm(l.value,l.commPct),repVendPct:l.repVendPct||0,repVendValue:calcComm(calcComm(l.value,l.commPct),l.repVendPct||0),repProdPct:l.repProdPct||0,repProdValue:calcComm(calcComm(l.value,l.commPct),l.repProdPct||0),owner:l.owner,result:col.terminal,date:dateStr(),month:new Date().toISOString().slice(0,7)};
    const ei=closings.findIndex(c=>c.leadId===leadId); if(ei>=0) closings[ei]=entry; else closings.push(entry);
  }
  showLoading(); await apiSave(); hideLoading(); renderAll(); showToast('Lead movido!');
}

// ── TASKS BADGE ──
function updateTasksBadge(){
  const myTasks=allTasksForUser();
  const pending=myTasks.filter(t=>t.status!=='done').length;
  const badge=document.getElementById('tasks-badge');
  badge.style.display=pending>0?'inline-block':'none';
  badge.textContent=String(pending);
}

function allTasksForUser(){
  const leadTasks=[];
  allLeads.forEach(l=>{
    if(currentRole!=='admin'&&l.owner!==currentUser) return;
    (l.tasks||[]).forEach((t,i)=>{ leadTasks.push({...t, _leadId:l.id, _taskIdx:i, _leadName:l.name, _source:'lead'}); });
  });
  const gTasks=(globalTasks||[]).filter(t=>currentRole==='admin'||t.owner===currentUser).map(t=>({...t,_source:'global'}));
  return [...leadTasks,...gTasks];
}

// ── TASKS PAGE ──
document.querySelector('.task-tabs').addEventListener('click', e=>{
  const btn=e.target.closest('[data-ttab]'); if(!btn) return;
  currentTaskTab=btn.dataset.ttab;
  document.querySelectorAll('.task-tab').forEach(b=>b.classList.toggle('active',b.dataset.ttab===currentTaskTab));
  renderTasksPage();
});

document.getElementById('new-task-btn').addEventListener('click', openGlobalTaskModal);

function renderTasksPage(){
  const wrap=document.getElementById('task-list-wrap'); wrap.innerHTML='';
  const all=allTasksForUser();
  const filtered=all.filter(t=>{
    if(currentTaskTab==='todo') return t.status==='todo'||t.status==='inprogress'||!t.status;
    return t.status==='done';
  }).sort((a,b)=>{
    if(a.due&&b.due) return a.due.localeCompare(b.due);
    if(a.due) return -1; if(b.due) return 1; return 0;
  });
  if(filtered.length===0){
    const em=el('div','empty-tasks'); em.innerHTML=`<i class="ti ti-checkbox" style="font-size:32px;opacity:.2;display:block;margin-bottom:8px;"></i>Nenhuma tarefa aqui.`; wrap.appendChild(em); return;
  }
  filtered.forEach(t=>{
    const card=el('div','task-card');
    // circle — toggle done
    const circle=el('div','task-circle'+(t.status==='done'?' done':''));
    if(t.status==='done') circle.innerHTML='<i class="ti ti-check" style="font-size:11px;"></i>';
    circle.addEventListener('click', async()=>{
      if(t.status!=='done'){
        // Ask for completion note
        openCompletionNote(t);
      } else {
        // Unmark done
        if(t._source==='global'){ const gt=globalTasks.find(x=>x.id===t.id); if(gt){gt.status='todo'; delete gt.completionNote;} }
        else { const lead=allLeads.find(l=>l.id===t._leadId); if(lead&&lead.tasks[t._taskIdx]){lead.tasks[t._taskIdx].status='todo'; delete lead.tasks[t._taskIdx].completionNote;} }
        showLoading(); await apiSave(); hideLoading(); renderTasksPage(); updateTasksBadge(); renderBoard();
      }
    });
    card.appendChild(circle);
    // info
    const info=el('div','task-info');
    const nm=el('div','task-card-name'+(t.status==='done'?' done':''),t.name); info.appendChild(nm);
    if(t.completionNote) info.appendChild(el('div','task-card-desc',`✅ ${t.completionNote}`));
    else if(t.desc) info.appendChild(el('div','task-card-desc',t.desc));
    const meta=el('div','task-card-meta');
    if(t.due){ const dp=el('span','task-meta-pill pill-date'); dp.innerHTML=`<i class="ti ti-clock" style="font-size:10px;"></i> ${fmtDue(t.due)}`; meta.appendChild(dp); }
    if(t._leadName){ const lp=el('span','task-meta-pill pill-lead'); lp.innerHTML=`<i class="ti ti-user" style="font-size:10px;"></i> ${t._leadName}`; meta.appendChild(lp); }
    if(t.status==='done') meta.appendChild(el('span','task-meta-pill pill-done','✓ Concluída'));
    info.appendChild(meta); card.appendChild(info);
    // actions
    const taskActs=el('div','task-actions');
    if(t._source==='global'){
      // Edit button
      const eb=el('button','task-act-btn'); eb.innerHTML='<i class="ti ti-pencil"></i>';
      eb.addEventListener('click',()=>openGlobalTaskModal(t.id));
      taskActs.appendChild(eb);
      // Delete button
      const db=el('button','task-act-btn'); db.innerHTML='<i class="ti ti-trash"></i>';
      db.addEventListener('click',async()=>{ globalTasks=globalTasks.filter(x=>x.id!==t.id); showLoading();await apiSave();hideLoading();renderTasksPage();updateTasksBadge(); });
      taskActs.appendChild(db);
    }
    card.appendChild(taskActs);
    wrap.appendChild(card);
  });
}

function openCompletionNote(t){
  const modal=document.getElementById('gtask-modal'); modal.innerHTML='';
  const hdr=el('div','modal-hdr');
  const av=el('div','modal-av'); av.innerHTML='<i class="ti ti-circle-check" style="font-size:18px;"></i>'; av.style.background='#ECFDF5'; av.style.color='#059669';
  const info=el('div'); info.appendChild(el('div','modal-title','Concluir Tarefa')); info.appendChild(el('div','modal-sub',t.name));
  const cb=el('button','modal-close'); cb.innerHTML='<i class="ti ti-x"></i>'; cb.addEventListener('click',()=>document.getElementById('gtask-overlay').style.display='none');
  hdr.appendChild(av); hdr.appendChild(info); hdr.appendChild(cb); modal.appendChild(hdr);
  const body=el('div','modal-body-pad');
  body.appendChild(el('label','lbl','O que foi feito? (opcional)'));
  const ta=document.createElement('textarea'); ta.className='inp'; ta.rows=3; ta.placeholder='Descreva o que foi realizado...'; ta.style.resize='vertical'; body.appendChild(ta);
  modal.appendChild(body);
  const foot=el('div','modal-foot');
  const btn=el('button','save-btn'); btn.style.background='#059669'; btn.innerHTML='<i class="ti ti-check"></i> Marcar como Concluída';
  btn.addEventListener('click',async()=>{
    const note=ta.value.trim();
    if(t._source==='global'){
      const gt=globalTasks.find(x=>x.id===t.id); if(gt){gt.status='done'; if(note) gt.completionNote=note;}
    } else {
      const lead=allLeads.find(l=>l.id===t._leadId);
      if(lead&&lead.tasks[t._taskIdx]){
        lead.tasks[t._taskIdx].status='done'; lead.tasks[t._taskIdx].done=true;
        if(note) lead.tasks[t._taskIdx].completionNote=note;
        lead.activities=lead.activities||[];
        lead.activities.push({type:'save',text:`Tarefa concluída: ${t.name}${note?' — '+note:''}`,by:currentUser,when:`${dateStr()} · ${nowStr()}`});
      }
    }
    document.getElementById('gtask-overlay').style.display='none';
    showLoading(); await apiSave(); hideLoading(); renderTasksPage(); updateTasksBadge(); renderBoard();
    showToast('Tarefa concluída!');
  });
  foot.appendChild(btn); modal.appendChild(foot);
  document.getElementById('gtask-overlay').style.display='flex';
  setTimeout(()=>ta.focus(),100);
}

function openGlobalTaskModal(editId){
  const modal=document.getElementById('gtask-modal'); modal.innerHTML='';
  const existing=editId?globalTasks.find(t=>t.id===editId):null;
  const hdr=el('div','modal-hdr');
  const av=el('div','modal-av'); av.innerHTML='<i class="ti ti-checkbox" style="font-size:18px;"></i>'; av.style.background='#EFF6FF'; av.style.color='#2563EB';
  const info=el('div'); info.appendChild(el('div','modal-title','Nova Tarefa')); info.appendChild(el('div','modal-sub','Adicionar ao menu de tarefas'));
  const cb=el('button','modal-close'); cb.innerHTML='<i class="ti ti-x"></i>'; cb.addEventListener('click',()=>document.getElementById('gtask-overlay').style.display='none');
  hdr.appendChild(av); hdr.appendChild(info); hdr.appendChild(cb); modal.appendChild(hdr);
  const body=el('div','modal-body-pad');
  function addF(lbl,inp){ const g=el('div','fw'); g.appendChild(el('label','lbl',lbl)); g.appendChild(inp); body.appendChild(g); return inp; }
  function mkInp(ph='',type='text',val=''){ const i=document.createElement('input'); i.className='inp'; i.type=type; i.placeholder=ph; i.value=val||''; return i; }
  const fName=addF('Nome da tarefa',mkInp('Descreva a tarefa','',(existing?.name||'')));
  const fDesc=addF('Descrição (opcional)',mkInp('Mais detalhes...','',(existing?.desc||'')));
  // date and time row
  const dRow=el('div'); dRow.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;';
  const dg1=el('div'); dg1.appendChild(el('label','lbl','Data (opcional)')); const fDate=document.createElement('input'); fDate.type='date'; fDate.className='inp'; if(existing?.due) fDate.value=existing.due.split('T')[0]; dg1.appendChild(fDate); dRow.appendChild(dg1);
  const dg2=el('div'); dg2.appendChild(el('label','lbl','Hora (opcional)')); const fTime=document.createElement('input'); fTime.type='time'; fTime.className='inp'; if(existing?.due&&existing.due.includes('T')) fTime.value=existing.due.split('T')[1]; dg2.appendChild(fTime); dRow.appendChild(dg2);
  body.appendChild(dRow);
  modal.appendChild(body);
  const foot=el('div','modal-foot');
  const btn=el('button','save-btn'); btn.innerHTML='<i class="ti ti-plus"></i> Criar Tarefa';
  btn.addEventListener('click',async()=>{
    const name=(fName.value||'').trim(); if(!name){alert('Informe o nome da tarefa.');return;}
    let due=''; if(fDate.value){ due=fDate.value; if(fTime.value) due+='T'+fTime.value; }
    const task={id:'gt'+Date.now(),name,desc:fDesc.value||'',due,owner:currentUser,status:'todo'};
    globalTasks.push(task);
    showLoading('Criando...'); await apiSave(); hideLoading();
    document.getElementById('gtask-overlay').style.display='none';
    renderTasksPage(); updateTasksBadge(); showToast('Tarefa criada!');
  });
  foot.appendChild(btn); modal.appendChild(foot);
  document.getElementById('gtask-overlay').style.display='flex';
  setTimeout(()=>fName.focus(),50);
}

function openLead(id){ const l=allLeads.find(x=>x.id===id); if(!l) return; buildLeadModal(l); document.getElementById('lead-overlay').style.display='flex'; }

function buildLeadModal(l){
  const modal=document.getElementById('lead-modal'); modal.innerHTML='';
  const ed=canEdit(l);
  const colName=columns.find(c=>c.id===l.col)?.name||l.col;
  const initials=l.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const commPct=Number(l.commPct||15);

  // header
  const hdr=el('div','modal-hdr');
  const av=el('div','modal-av',initials); av.style.background='#EFF6FF'; av.style.color='#2563EB';
  const info=el('div');
  info.appendChild(el('div','modal-badge',colName));
  info.appendChild(el('div','modal-title',l.name));
  const sub=el('div','modal-sub'); sub.innerHTML=`${l.dealName?`<strong>${l.dealName}</strong> · `:''}${l.product||'—'} · <span style="color:#059669;font-weight:600;">${fmt(l.value)}</span>`; info.appendChild(sub);
  const cb=el('button','modal-close'); cb.innerHTML='<i class="ti ti-x"></i>'; cb.addEventListener('click',closeLead);
  hdr.appendChild(av); hdr.appendChild(info); hdr.appendChild(cb); modal.appendChild(hdr);
  if(!ed){ const ban=el('div','ro-banner'); ban.innerHTML='<i class="ti ti-eye"></i> Somente leitura.'; modal.appendChild(ban); }

  // actions
  const acts=el('div','modal-acts');
  const stageSel=el('select','stage-sel');
  columns.forEach(c=>{ const o=el('option','',c.name); o.value=c.id; if(c.id===l.col) o.selected=true; stageSel.appendChild(o); });
  stageSel.disabled=!ed;

function abrirFerrRenovacoes(){
  const body=document.getElementById('ferr-body'); body.innerHTML='';

  // Back button
  const back=el('button','ibtn'); back.innerHTML='<i class="ti ti-arrow-left"></i> Voltar'; back.style.marginBottom='1rem';
  back.addEventListener('click',()=>renderFerramentas());
  body.appendChild(back);

  // Two-column layout
  const layout=el('div'); layout.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start;';

  // LEFT — Upload
  const left=el('div');
  const leftTitle=el('div','sec-lbl','📤 Upload do PDF');
  left.appendChild(leftTitle);

  const desc=el('div'); desc.style.cssText='background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:12px 14px;margin-bottom:1rem;font-size:12px;color:#1E40AF;line-height:1.6;';
  desc.innerHTML='Exporte o <strong>REN01</strong> do SGCOR e faça o upload abaixo. A IA irá extrair todos os segurados e preparar os cards para importação.';
  left.appendChild(desc);

  const uploadWrap=el('div'); uploadWrap.style.cssText='border:2px dashed #D1D5DB;border-radius:12px;padding:2rem;text-align:center;cursor:pointer;transition:all .2s;background:#FAFAFA;';
  uploadWrap.innerHTML=`<i class="ti ti-file-type-pdf" style="font-size:40px;color:#9CA3AF;display:block;margin-bottom:8px;"></i>
    <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:4px;">Arraste o PDF aqui</div>
    <div style="font-size:11px;color:#9CA3AF;margin-bottom:12px;">ou clique para selecionar</div>
    <div style="display:inline-block;background:#2563EB;color:#fff;padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;">Selecionar arquivo</div>`;

  const fileInput=document.createElement('input'); fileInput.type='file'; fileInput.accept='.pdf'; fileInput.style.display='none';
  uploadWrap.addEventListener('click',()=>fileInput.click());
  uploadWrap.addEventListener('dragover',e=>{e.preventDefault();uploadWrap.style.borderColor='#2563EB';uploadWrap.style.background='#EFF6FF';});
  uploadWrap.addEventListener('dragleave',()=>{uploadWrap.style.borderColor='#D1D5DB';uploadWrap.style.background='#FAFAFA';});
  uploadWrap.addEventListener('drop',e=>{
    e.preventDefault();uploadWrap.style.borderColor='#D1D5DB';uploadWrap.style.background='#FAFAFA';
    if(e.dataTransfer.files[0]) processRenovacaoPDF(e.dataTransfer.files[0], right, importBtn);
  });
  fileInput.addEventListener('change',()=>{ if(fileInput.files[0]) processRenovacaoPDF(fileInput.files[0], right, importBtn); });
  left.appendChild(uploadWrap); left.appendChild(fileInput);

  // RIGHT — Preview panel
  const right=el('div');
  right.style.cssText='background:#F9FAFB;border:1px solid #E5E7EB;border-radius:12px;padding:1rem;min-height:300px;';
  const rightEmpty=el('div'); rightEmpty.style.cssText='text-align:center;padding:3rem 1rem;color:#9CA3AF;';
  rightEmpty.innerHTML=`<i class="ti ti-file-search" style="font-size:36px;display:block;margin-bottom:8px;opacity:.4;"></i>
    <div style="font-size:13px;font-weight:500;">Os negócios extraídos<br>aparecerão aqui</div>`;
  right.appendChild(rightEmpty);

  layout.appendChild(left); layout.appendChild(right); body.appendChild(layout);

  // Import button — hidden initially
  const importBtn=el('button','save-btn'); importBtn.style.cssText='margin-top:1rem;display:none;';
  importBtn.innerHTML='<i class="ti ti-plus"></i> Importar para o Pipeline';
  body.appendChild(importBtn);
}

async function processRenovacaoPDF(file, previewPanel, importBtn){
  previewPanel.innerHTML=`
    <div style="text-align:center;padding:2rem;">
      <div style="font-size:28px;margin-bottom:8px;">🤖</div>
      <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:4px;">Processando PDF...</div>
      <div style="font-size:11px;color:#9CA3AF;margin-bottom:12px;">A IA está extraindo os dados</div>
      <div style="height:4px;background:#E5E7EB;border-radius:2px;overflow:hidden;">
        <div id="prog-bar" style="height:100%;background:#2563EB;border-radius:2px;width:0%;transition:width .3s;"></div>
      </div>
    </div>`;

  let prog=0; const progInt=setInterval(()=>{ prog=Math.min(prog+2,85); const pb=document.getElementById('prog-bar'); if(pb) pb.style.width=prog+'%'; },100);

  try {
    // Step 1: Upload PDF to OpenAI Files API
    const formData=new FormData();
    formData.append('file', file, file.name);
    formData.append('purpose','assistants');

    const uploadResp=await fetch('https://api.openai.com/v1/files',{
      method:'POST',
      headers:{'Authorization':'Bearer '+OPENAI_KEY},
      body:formData
    });
    const uploadData=await uploadResp.json();
    if(!uploadResp.ok) throw new Error(uploadData.error?.message||'Erro ao enviar PDF');
    const fileId=uploadData.id;

    // Step 2: Call GPT-4o with file
    const prompt=`Analise este PDF do Relatório de Renovações REN01 do sistema SGCOR e extraia TODOS os registros de renovação.

Para cada registro retorne um JSON com este formato exato:
{
  "renovacoes": [
    {
      "nome": "Nome capitalizado (primeira letra maiúscula de cada palavra)",
      "ramo": "Ramo exato do PDF (ex: AUTOMÓVEL, RESIDENCIAL, VIDA INDIVIDUAL)",
      "companhia": "Nome da seguradora",
      "vencimento": "DD/MM/AAAA",
      "premio_liquido": "número decimal com ponto ex: 1234.56",
      "apolice": "número da apólice"
    }
  ]
}

Inclua TODOS os registros mesmo com prêmio 0,00. Retorne APENAS o JSON puro, sem markdown, sem texto adicional.`;

    const resp=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+OPENAI_KEY},
      body:JSON.stringify({
        model:'gpt-4o',
        max_tokens:8192,
        messages:[{
          role:'user',
          content:[
            {type:'text',text:prompt},
            {type:'file',file:{file_id:fileId}}
          ]
        }]
      })
    });

    const data=await resp.json();
    clearInterval(progInt);

    // Cleanup: delete uploaded file
    fetch('https://api.openai.com/v1/files/'+fileId,{method:'DELETE',headers:{'Authorization':'Bearer '+OPENAI_KEY}});

    if(!resp.ok||data.error) throw new Error(data.error?.message||'Erro na API OpenAI');

    const text=data.choices?.[0]?.message?.content||'';
    const clean=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    const renovacoes=parsed.renovacoes||[];
    if(renovacoes.length===0) throw new Error('Nenhum registro encontrado');

    showRenovacoesPreview(renovacoes, previewPanel, importBtn);

  } catch(e){
    clearInterval(progInt);
    previewPanel.innerHTML=`<div style="padding:1rem;text-align:center;">
      <div style="font-size:24px;margin-bottom:8px;">❌</div>
      <div style="font-size:13px;font-weight:600;color:#DC2626;margin-bottom:4px;">Erro ao processar</div>
      <div style="font-size:11px;color:#EF4444;">${e.message}</div>
    </div>`;
  }
}

function showRenovacoesPreview(renovacoes, panel, importBtn){
  panel.innerHTML='';

  const total=renovacoes.length;
  const totalPremio=renovacoes.reduce((s,r)=>s+(parseFloat(r.premio_liquido)||0),0);

  // Summary cards
  const sg=el('div'); sg.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;';
  function sc(lbl,val,color){
    const c=el('div'); c.style.cssText=`background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:8px 10px;`;
    c.innerHTML=`<div style="font-size:9px;font-weight:600;color:#9CA3AF;text-transform:uppercase;margin-bottom:2px;">${lbl}</div><div style="font-size:16px;font-weight:700;color:${color};">${val}</div>`;
    return c;
  }
  sg.appendChild(sc('Negócios',total,'#2563EB'));
  sg.appendChild(sc('Prêmio Total',fmt(totalPremio),'#059669'));
  panel.appendChild(sg);

  // Title
  const t=el('div','sec-lbl','Negócios extraídos'); panel.appendChild(t);

  // List
  const list=el('div'); list.style.cssText='max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;';
  renovacoes.forEach(r=>{
    const ramo=(r.ramo||'').toLowerCase();
    const isNalberty=ramo.includes('auto')||ramo.includes('moto')||ramo.includes('resid');
    const resp=isNalberty?'N':'A';
    const respColor=isNalberty?'#059669':'#2563EB';
    const respBg=isNalberty?'#ECFDF5':'#EFF6FF';

    const item=el('div'); item.style.cssText='background:#fff;border:1px solid #F3F4F6;border-radius:8px;padding:8px 10px;';
    item.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;">
        <div style="font-size:12px;font-weight:600;color:#111827;">${r.nome||'—'}</div>
        <span style="background:${respBg};color:${respColor};border-radius:999px;padding:1px 8px;font-size:10px;font-weight:700;">${isNalberty?'Nalberty':'Admin'}</span>
      </div>
      <div style="font-size:10px;color:#6B7280;">${r.ramo||'—'} · ${r.companhia||'—'}</div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;">
        <span style="font-size:10px;color:#9CA3AF;">Venc: ${r.vencimento||'—'}</span>
        <span style="font-size:11px;font-weight:600;color:#059669;">${fmt(parseFloat(r.premio_liquido)||0)}</span>
      </div>`;
    list.appendChild(item);
  });
  panel.appendChild(list);

  // Show import button
  let savedRenovacoes=renovacoes;
  importBtn.style.display='flex';
  importBtn.onclick=()=>importarRenovacoes(savedRenovacoes, importBtn, panel);
}

async function importarRenovacoes(renovacoes, btn, panel){
  btn.disabled=true; btn.textContent='Importando...';
  try {
    const data=await apiLoad();
    const leads=data.leads||[];
    const today=dateStr(); const now=nowStr();

    renovacoes.forEach(r=>{
      const ramo=(r.ramo||'').toLowerCase();
      const isNalberty=ramo.includes('auto')||ramo.includes('moto')||ramo.includes('resid');
      const owner=isNalberty?'nalberty':'admin';
      let product='Outros';
      if(ramo.includes('auto')||ramo.includes('moto')) product='Automóvel';
      else if(ramo.includes('resid')) product='Residência';
      else if(ramo.includes('vida')) product='Vida';
      else if(ramo.includes('saúde')||ramo.includes('saude')) product='Saúde';
      else if(ramo.includes('viagem')) product='Viagem';
      else if(ramo.includes('empresa')) product='Empresarial';

      leads.push({
        id:'l'+Date.now()+Math.random().toString(36).substr(2,5),
        name:r.nome||'Sem nome',
        dealName:r.ramo||'',
        product, insuranceType:'Renovação Própria',
        col:'lead', value:parseFloat(r.premio_liquido)||0,
        commPct:15, repVendPct:0, repProdPct:0, owner,
        phone:'', obs:`Vencimento: ${r.vencimento||'—'} | Prêmio Líq.: ${fmt(parseFloat(r.premio_liquido)||0)} | Apólice: ${r.apolice||'—'} | Cia: ${r.companhia||'—'}`,
        tags:[], tasks:[], mentionNalberty:false,
        activities:[{type:'save',text:'Lead importado via Ferramentas IA — Relatório de Renovações',by:currentUser,when:`${today} · ${now}`}]
      });
    });

    await apiSave({...data, leads});
    allLeads=leads;
    btn.style.background='#059669';
    btn.innerHTML='<i class="ti ti-check"></i> Importado com sucesso!';
    renderAll();
    showToast(`✅ ${renovacoes.length} renovações importadas para o pipeline!`);

    // Show pipeline link
    setTimeout(()=>{
      const link=el('div'); link.style.cssText='text-align:center;margin-top:8px;';
      const a=el('button','save-btn'); a.style.cssText='background:#7C3AED;display:inline-flex;width:auto;padding:8px 20px;';
      a.innerHTML='<i class="ti ti-layout-kanban"></i> Ver no Pipeline';
      a.addEventListener('click',()=>document.querySelector('[data-page="pipeline"]').click());
      link.appendChild(a); document.getElementById('ferr-body').appendChild(link);
    },400);

  } catch(e){
    btn.disabled=false;
    btn.innerHTML='<i class="ti ti-plus"></i> Importar para o Pipeline';
    showToast('Erro: '+e.message);
  }
}
