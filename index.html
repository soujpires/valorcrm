function renderChecklistTemplates(body){
  body.id='cfg-checklists-body'; // ancora o body com ID para re-renderizar sempre no lugar certo
  _renderChecklistTpls();
}

function _renderChecklistTpls(){
  const body=document.getElementById('cfg-checklists-body'); if(!body) return;
  const op=getOpData();
  body.innerHTML='';

  if(op.checklistTemplates.length===0){
    const em=el('div'); em.style.cssText='color:var(--text4);font-size:13px;margin-bottom:12px;'; em.textContent='Nenhum template criado ainda.';
    body.appendChild(em);
  }

  op.checklistTemplates.forEach((tpl,ti)=>{
    const card=document.createElement('div');
    card.style.cssText='border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:var(--surface);';
    const hdrRow=document.createElement('div'); hdrRow.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;';
    const nm=el('div','',tpl.name); nm.style.cssText='font-size:13px;font-weight:600;color:var(--text1);flex:1;';
    // Lápis editar nome
    const editTpl=document.createElement('button');
    editTpl.style.cssText='border:none;background:transparent;color:var(--text4);cursor:pointer;font-size:13px;';
    editTpl.innerHTML='<i class="ti ti-pencil"></i>';
    editTpl.title='Editar nome';
    editTpl.addEventListener('click',()=>{
      // Substitui o texto por input inline
      const inp=document.createElement('input'); inp.value=tpl.name;
      inp.style.cssText='flex:1;border:1px solid var(--blue);border-radius:6px;padding:4px 8px;font-size:13px;font-weight:600;font-family:\'DM Sans\',sans-serif;color:var(--text1);background:var(--input-bg);outline:none;width:100%;';
      nm.replaceWith(inp); inp.focus(); inp.select();
      const confirm=()=>{
        const v=inp.value.trim(); if(!v) return;
        const freshTpl=getOpData().checklistTemplates.find(t=>t.id===tpl.id);
        if(freshTpl) freshTpl.name=v;
        saveOpData(); _renderChecklistTpls();
      };
      inp.addEventListener('blur',confirm);
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter') confirm(); if(e.key==='Escape') _renderChecklistTpls(); });
    });
    const delTpl=document.createElement('button');
    delTpl.style.cssText='border:none;background:transparent;color:var(--text4);cursor:pointer;font-size:13px;';
    delTpl.innerHTML='<i class="ti ti-trash"></i>';
    delTpl.addEventListener('click',()=>{ getOpData().checklistTemplates.splice(ti,1); saveOpData(); _renderChecklistTpls(); });
    hdrRow.appendChild(nm); hdrRow.appendChild(editTpl); hdrRow.appendChild(delTpl); card.appendChild(hdrRow);

    tpl.items.forEach((item,ii)=>{
      const row=document.createElement('div'); row.style.cssText='display:flex;align-items:center;gap:7px;padding:3px 0;font-size:12px;color:var(--text2);';
      const icon=document.createElement('i'); icon.className='ti ti-circle'; icon.style.cssText='font-size:11px;color:var(--text4);flex-shrink:0;';
      const itemTxt=document.createElement('span'); itemTxt.style.flex='1'; itemTxt.textContent=item;
      const delItem=document.createElement('button');
      delItem.style.cssText='border:none;background:transparent;color:var(--text4);cursor:pointer;font-size:11px;margin-left:auto;flex-shrink:0;';
      delItem.innerHTML='<i class="ti ti-x"></i>';
      delItem.addEventListener('click',()=>{ tpl.items.splice(ii,1); saveOpData(); _renderChecklistTpls(); });
      row.appendChild(icon); row.appendChild(itemTxt); row.appendChild(delItem); card.appendChild(row);
    });

    const addRow=document.createElement('div'); addRow.style.cssText='display:flex;gap:6px;margin-top:8px;';
    const addInp=document.createElement('input'); addInp.placeholder='Novo item...';
    addInp.style.cssText='flex:1;border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:12px;font-family:\'DM Sans\',sans-serif;color:var(--text1);background:var(--input-bg);outline:none;';
    const addBtn=document.createElement('button');
    addBtn.style.cssText='background:var(--blue);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:\'DM Sans\',sans-serif;';
    addBtn.textContent='+ Item';
    addBtn.addEventListener('click',()=>{
      const v=addInp.value.trim(); if(!v) return;
      // Busca o template pelo ID para garantir referência fresca
      const freshTpl=getOpData().checklistTemplates.find(t=>t.id===tpl.id);
      if(freshTpl){ freshTpl.items.push(v); } else { tpl.items.push(v); }
      addInp.value='';
      saveOpData(); _renderChecklistTpls();
    });
    addInp.addEventListener('keydown',e=>{ if(e.key==='Enter') addBtn.click(); });
    addRow.appendChild(addInp); addRow.appendChild(addBtn); card.appendChild(addRow);
    body.appendChild(card);
  });

  // Criar novo template
  const newWrap=document.createElement('div'); newWrap.style.cssText='border:1.5px dashed var(--border);border-radius:10px;padding:12px 14px;margin-top:4px;';
  newWrap.appendChild(el('div','op-side-label','Novo template'));
  const nmRow=document.createElement('div'); nmRow.style.cssText='display:flex;gap:6px;';
  const nmInp=document.createElement('input'); nmInp.placeholder='Nome do template...';
  nmInp.style.cssText='flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:\'DM Sans\',sans-serif;color:var(--text1);background:var(--input-bg);outline:none;';
  const nmBtn=document.createElement('button');
  nmBtn.style.cssText='background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;';
  nmBtn.textContent='Criar';
  nmBtn.addEventListener('click',()=>{
    const n=nmInp.value.trim(); if(!n){ nmInp.focus(); return; }
    const freshOp=getOpData();
    freshOp.checklistTemplates=freshOp.checklistTemplates||[];
    freshOp.checklistTemplates.push({id:'tpl-'+Date.now(),name:n,items:[]});
    nmInp.value='';
    saveOpData();
    _renderChecklistTpls();
  });
  nmInp.addEventListener('keydown',e=>{ if(e.key==='Enter') nmBtn.click(); });
  nmRow.appendChild(nmInp); nmRow.appendChild(nmBtn); newWrap.appendChild(nmRow);
  body.appendChild(newWrap);
  nmInp.focus();
}

// ══════════════════════════════════════════════
// ── OPERACIONAL BOARD ──
// ══════════════════════════════════════════════

const OP_COLORS = [
  {name:'Azul',    bg:'#DBEAFE', color:'#1E40AF'},
  {name:'Verde',   bg:'#DCFCE7', color:'#166534'},
  {name:'Amarelo', bg:'#FEF9C3', color:'#854D0E'},
  {name:'Vermelho',bg:'#FEE2E2', color:'#991B1B'},
  {name:'Roxo',    bg:'#EDE9FE', color:'#5B21B6'},
  {name:'Laranja', bg:'#FFEDD5', color:'#9A3412'},
  {name:'Cinza',   bg:'#F3F4F6', color:'#374151'},
];

const OP_COL_COLORS = ['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#06B6D4','#EC4899'];

let opDragCardId=null, opDragColId=null;

function getOpData(){
  if(!window._opData){
    window._opData = {
      columns:[
        {id:'op-backlog',    name:'Backlog',     color:'#6B7280'},
        {id:'op-andamento',  name:'Em Andamento',color:'#3B82F6'},
        {id:'op-revisao',    name:'Em Revisão',  color:'#F59E0B'},
        {id:'op-concluido',  name:'Concluído',   color:'#10B981'},
      ],
      cards:[],
      checklistTemplates:[]
    };
  }
  if(!window._opData.checklistTemplates) window._opData.checklistTemplates=[];
  if(!window._opData.cards) window._opData.cards=[];
  if(!window._opData.columns) window._opData.columns=[];
  return window._opData;
}

function saveOpData(){
  window._opDataDirty=true;
  apiSave();
}

function renderOpBoard(){
  const op = getOpData();
  const board = document.getElementById('op-board');
  board.innerHTML='';

  op.columns.forEach(col=>{
    const cards = op.cards.filter(c=>c.colId===col.id);
    const colEl = document.createElement('div');
    colEl.className='op-col';
    colEl.dataset.colId=col.id;

    // Header
    const hdr=document.createElement('div'); hdr.className='op-col-hdr';
    const dot=document.createElement('div'); dot.className='op-col-dot'; dot.style.background=col.color;
    const nm=document.createElement('div'); nm.className='op-col-name'; nm.textContent=col.name;
    const cnt=document.createElement('div'); cnt.className='op-col-cnt'; cnt.textContent=cards.length;
    const menuBtn=document.createElement('button'); menuBtn.className='op-col-menu'; menuBtn.innerHTML='<i class="ti ti-dots"></i>';
    menuBtn.addEventListener('click',e=>{ e.stopPropagation(); openOpColMenu(col, menuBtn); });
    hdr.appendChild(dot); hdr.appendChild(nm); hdr.appendChild(cnt); hdr.appendChild(menuBtn);

    // Cards body
    const body=document.createElement('div'); body.className='op-col-body';
    body.addEventListener('dragover',e=>{ e.preventDefault(); colEl.classList.add('drag-over'); });
    body.addEventListener('dragleave',()=>colEl.classList.remove('drag-over'));
    body.addEventListener('drop',e=>{ e.preventDefault(); colEl.classList.remove('drag-over'); dropOpCard(col.id); });

    cards.forEach(card=>{ body.appendChild(buildOpCard(card)); });

    // Add card button
    const addBtn=document.createElement('button'); addBtn.className='op-add-card-btn';
    addBtn.innerHTML='<i class="ti ti-plus"></i> Adicionar cartão';
    addBtn.addEventListener('click',()=>openNewOpCard(col.id));

    colEl.appendChild(hdr); colEl.appendChild(body); colEl.appendChild(addBtn);
    board.appendChild(colEl);
  });

  // Add column button
  const addColWrap=document.createElement('div'); addColWrap.className='op-add-col';
  const addColBtn=document.createElement('button'); addColBtn.className='op-add-col-btn';
  addColBtn.innerHTML='<i class="ti ti-plus"></i> Nova coluna';
  addColBtn.addEventListener('click',openNewOpCol);
  addColWrap.appendChild(addColBtn);
  board.appendChild(addColWrap);
}

function buildOpCard(card){
  const el2=document.createElement('div'); el2.className='op-card'; el2.draggable=true;
  el2.dataset.cardId=card.id;

  el2.addEventListener('dragstart',()=>{ opDragCardId=card.id; opDragColId=card.colId; el2.classList.add('dragging'); });
  el2.addEventListener('dragend',()=>el2.classList.remove('dragging'));
  el2.addEventListener('click',()=>openOpCard(card.id));

  // Labels
  if(card.labels && card.labels.length>0){
    const labWrap=document.createElement('div'); labWrap.className='op-card-label';
    card.labels.forEach(l=>{
      const lc=OP_COLORS.find(c=>c.name===l)||OP_COLORS[0];
      const pill=document.createElement('span'); pill.className='op-label-pill';
      pill.style.background=lc.bg; pill.style.color=lc.color;
      pill.textContent=l; labWrap.appendChild(pill);
    });
    el2.appendChild(labWrap);
  }

  // Title
  const title=document.createElement('div'); title.className='op-card-title'; title.textContent=card.title;
  el2.appendChild(title);

  // Desc
  if(card.desc){ const d=document.createElement('div'); d.className='op-card-desc'; d.textContent=card.desc; el2.appendChild(d); }

  // Checklist progress
  if(card.checklist && card.checklist.length>0){
    const done=card.checklist.filter(i=>i.done).length;
    const total=card.checklist.length;
    const pct=Math.round(done/total*100);
    const clWrap=document.createElement('div'); clWrap.className='op-checklist-bar';
    const prog=document.createElement('div'); prog.className='op-checklist-prog';
    const fill=document.createElement('div'); fill.className='op-checklist-fill'; fill.style.width=pct+'%';
    prog.appendChild(fill);
    const txt=document.createElement('div'); txt.className='op-checklist-txt'; txt.textContent=`${done}/${total}`;
    clWrap.appendChild(prog); clWrap.appendChild(txt);
    el2.appendChild(clWrap);
  }

  // Footer meta
  const foot=document.createElement('div'); foot.className='op-card-foot';
  if(card.due){
    const today=dateStr(); const due=card.due.split('T')[0];
    const meta=document.createElement('div');
    meta.className='op-card-meta'+(due<today?' overdue':due===today?' due-soon':'');
    meta.innerHTML=`<i class="ti ti-calendar" style="font-size:11px;"></i> ${due.split('-').reverse().join('/')}`;
    foot.appendChild(meta);
  }
  if(card.priority){
    const pColors={Alta:'#DC2626',Média:'#D97706',Baixa:'#059669'};
    const pm=document.createElement('div'); pm.className='op-card-meta';
    pm.style.color=pColors[card.priority]||'var(--text3)';
    pm.innerHTML=`<i class="ti ti-flag" style="font-size:11px;"></i> ${card.priority}`;
    foot.appendChild(pm);
  }
  if(foot.children.length) el2.appendChild(foot);

  return el2;
}

function dropOpCard(targetColId){
  if(!opDragCardId) return;
  const op=getOpData();
  const card=op.cards.find(c=>c.id===opDragCardId);
  if(card){ card.colId=targetColId; saveOpData(); renderOpBoard(); }
  opDragCardId=null; opDragColId=null;
}

// ── Nova Tarefa / Abrir Card ──
function openNewOpCard(colId){
  openOpCard(null, colId);
}

function openOpCard(cardId, defaultColId){
  const op=getOpData();
  const card = cardId ? op.cards.find(c=>c.id===cardId) : {
    id:'op-'+Date.now(), colId:defaultColId||op.columns[0]?.id,
    title:'',desc:'',labels:[],checklist:[],due:'',priority:'',activities:[],
    createdAt:dateStr()+' '+nowStr(), _isNew:true
  };
  if(!card) return;
  if(!card.activities) card.activities=[];
  if(!card.checklist) card.checklist=[];

  const modal=document.getElementById('op-modal');
  const overlay=document.getElementById('op-overlay');
  overlay.style.display='flex'; modal.innerHTML='';

  // ── HEADER ──
  const hdr=document.createElement('div'); hdr.className='modal-hdr';
  const info=document.createElement('div'); info.style.flex='1';
  const col=op.columns.find(c=>c.id===card.colId);
  const badge=el('div','modal-badge',col?.name||'');
  badge.style.background=(col?.color||'#6B7280')+'22'; badge.style.color=col?.color||'#6B7280';
  const titleInp=document.createElement('input');
  titleInp.value=card.title; titleInp.placeholder='Título da tarefa...';
  titleInp.style.cssText='font-size:17px;font-weight:600;color:var(--text1);border:none;border-bottom:2px solid var(--border);outline:none;width:100%;background:transparent;font-family:\'DM Sans\',sans-serif;margin-top:4px;padding-bottom:4px;transition:border-color .15s;';
  titleInp.addEventListener('focus',()=>titleInp.style.borderBottomColor='var(--blue)');
  titleInp.addEventListener('blur',()=>titleInp.style.borderBottomColor='var(--border)');
  titleInp.addEventListener('input',()=>{ card.title=titleInp.value; });
  info.appendChild(badge); info.appendChild(titleInp);
  const closeBtn=el('button','modal-close',''); closeBtn.innerHTML='<i class="ti ti-x"></i>';
  closeBtn.addEventListener('click',()=>overlay.style.display='none');
  hdr.appendChild(info); hdr.appendChild(closeBtn); modal.appendChild(hdr);

  const selStyle='border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;font-family:\'DM Sans\',sans-serif;color:var(--text1);background:var(--input-bg);outline:none;';

  // ── TOOLBAR ──
  const toolbar=document.createElement('div');
  toolbar.style.cssText='display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:.65rem 1.4rem;border-bottom:1px solid var(--border);background:var(--bg2);';

  const colSel=document.createElement('select'); colSel.style.cssText=selStyle;
  op.columns.forEach(c=>{ const o=document.createElement('option'); o.value=c.id; o.textContent=c.name; if(c.id===card.colId) o.selected=true; colSel.appendChild(o); });
  colSel.addEventListener('change',()=>{ card.colId=colSel.value; });

  const priSel=document.createElement('select'); priSel.style.cssText=selStyle;
  ['','Alta','Média','Baixa'].forEach(p=>{ const o=document.createElement('option'); o.value=p; o.textContent=p||'Prioridade'; if(p===card.priority) o.selected=true; priSel.appendChild(o); });
  priSel.addEventListener('change',()=>{ card.priority=priSel.value; });

  // Data sempre visível na toolbar com label
  const dateLbl=document.createElement('span'); dateLbl.style.cssText='font-size:11px;color:var(--text3);white-space:nowrap;'; dateLbl.textContent='Entrega:';
  const dateInpToolbar=document.createElement('input'); dateInpToolbar.type='date';
  dateInpToolbar.value=card.due||''; dateInpToolbar.style.cssText=selStyle;
  dateInpToolbar.addEventListener('change',()=>{ card.due=dateInpToolbar.value; });

  // toggle helper for labels/date
  const togglePanels={labels:false,date:false};
  function mkToggleBtn(icon,label,key){
    const btn=document.createElement('button');
    btn.style.cssText='display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:\'DM Sans\',sans-serif;';
    btn.innerHTML=`<i class="ti ti-${icon}" style="font-size:13px;"></i>${label}`;
    btn.addEventListener('click',()=>{
      togglePanels[key]=!togglePanels[key];
      btn.style.background=togglePanels[key]?'var(--blue-light)':'var(--surface)';
      btn.style.color=togglePanels[key]?'var(--blue)':'var(--text2)';
      btn.style.borderColor=togglePanels[key]?'var(--blue)':'var(--border)';
      renderToggleArea();
    });
    return btn;
  }

  const btnLab=mkToggleBtn('tag','Etiquetas','labels');

  // Importar Checklist
  const btnImport=document.createElement('button');
  btnImport.style.cssText='display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:\'DM Sans\',sans-serif;';
  btnImport.innerHTML='<i class="ti ti-clipboard-list" style="font-size:13px;"></i>Importar Checklist';
  btnImport.addEventListener('click',()=>openImportChecklist(card, renderChecklistSection));

  toolbar.appendChild(colSel); toolbar.appendChild(priSel);
  toolbar.appendChild(dateLbl); toolbar.appendChild(dateInpToolbar);
  toolbar.appendChild(btnLab); toolbar.appendChild(btnImport);

  if(!card._isNew){
    const sep=document.createElement('div'); sep.style.cssText='flex:1;';
    const delBtn=document.createElement('button');
    delBtn.style.cssText='display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid #FCA5A5;border-radius:8px;background:transparent;color:#DC2626;font-size:12px;cursor:pointer;font-family:\'DM Sans\',sans-serif;';
    delBtn.innerHTML='<i class="ti ti-trash" style="font-size:13px;"></i>Excluir';
    delBtn.addEventListener('click',()=>{
      if(!confirm('Excluir esta tarefa?')) return;
      op.cards=op.cards.filter(c=>c.id!==card.id);
      overlay.style.display='none'; saveOpData(); renderOpBoard();
    });
    toolbar.appendChild(sep); toolbar.appendChild(delBtn);
  }
  modal.appendChild(toolbar);

  // ── TOGGLE AREA (etiquetas / datas) ──
  const toggleArea=document.createElement('div');
  modal.appendChild(toggleArea);

  function renderToggleArea(){
    toggleArea.innerHTML='';
    const hasAny=Object.values(togglePanels).some(Boolean);
    toggleArea.style.cssText=hasAny?'padding:0 1.4rem;border-bottom:1px solid var(--border2);':'';
    if(togglePanels.labels){
      const wrap=document.createElement('div'); wrap.style.cssText='padding:.65rem 0;display:flex;flex-wrap:wrap;gap:6px;';
      OP_COLORS.forEach(lc=>{
        const pill=document.createElement('div');
        const active=(card.labels||[]).includes(lc.name);
        pill.style.cssText=`padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;cursor:pointer;background:${lc.bg};color:${lc.color};border:2px solid ${active?lc.color:'transparent'};`;
        pill.textContent=lc.name;
        pill.addEventListener('click',()=>{ card.labels=card.labels||[]; const idx=card.labels.indexOf(lc.name); if(idx>=0) card.labels.splice(idx,1); else card.labels.push(lc.name); pill.style.borderColor=(card.labels||[]).includes(lc.name)?lc.color:'transparent'; });
        wrap.appendChild(pill);
      });
      toggleArea.appendChild(wrap);
    }
    if(togglePanels.date){
      const wrap=document.createElement('div'); wrap.style.cssText='padding:.65rem 0;display:flex;align-items:center;gap:10px;';
      wrap.appendChild(el('div','op-side-label','Data de entrega'));
      const inp=document.createElement('input'); inp.type='date'; inp.value=card.due||'';
      inp.style.cssText=selStyle;
      inp.addEventListener('change',()=>{ card.due=inp.value; });
      wrap.appendChild(inp); toggleArea.appendChild(wrap);
    }
  }

  // ── BODY: esquerda = desc + checklist | direita = follow-up ──
  const body=document.createElement('div');
  body.style.cssText='display:grid;grid-template-columns:1fr 280px;gap:0;flex:1;overflow:hidden;min-height:0;';

  // ESQUERDA
  const left=document.createElement('div');
  left.style.cssText='display:flex;flex-direction:column;padding:1rem 1.4rem;overflow-y:auto;border-right:1px solid var(--border2);gap:12px;';

  // Descrição
  left.appendChild(el('div','sec-lbl','<i class="ti ti-align-left" style="font-size:13px;"></i> Descrição'));
  const descTA=document.createElement('textarea');
  descTA.value=card.desc||''; descTA.placeholder='Instruções, contexto e detalhes da tarefa...';
  descTA.style.cssText='width:100%;min-height:120px;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;font-family:\'DM Sans\',sans-serif;color:var(--text1);background:var(--input-bg);resize:vertical;outline:none;line-height:1.5;';
  descTA.addEventListener('input',()=>card.desc=descTA.value);
  left.appendChild(descTA);

  // Checklist section
  const clSection=document.createElement('div');
  left.appendChild(clSection);

  function renderChecklistSection(){
    clSection.innerHTML='';
    const hasGroups=card.checklists&&card.checklists.length>0;
    const hasManual=card.checklist&&card.checklist.filter(i=>i.text||i._editing).length>0;

    if(!hasGroups && !hasManual){
      const addOnlyRow=document.createElement('div'); addOnlyRow.style.cssText='display:flex;align-items:center;gap:6px;';
      const addOnlyBtn=document.createElement('button');
      addOnlyBtn.style.cssText='display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px dashed var(--border);border-radius:8px;background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:\'DM Sans\',sans-serif;';
      addOnlyBtn.innerHTML='<i class="ti ti-plus" style="font-size:13px;"></i> Adicionar checklist';
      addOnlyBtn.addEventListener('click',()=>{ card.checklist=card.checklist||[]; card.checklist.push({text:'',done:false,_editing:true}); renderChecklistSection(); });
      addOnlyRow.appendChild(addOnlyBtn); clSection.appendChild(addOnlyRow);
      return;
    }

    // ── Grupos importados ──
    if(hasGroups){
      card.checklists.forEach((grp,gi)=>{
        const grpDone=grp.items.filter(i=>i.done).length;
        const grpTotal=grp.items.length;
        const grpPct=grpTotal>0?Math.round(grpDone/grpTotal*100):0;

        const grpHdr=document.createElement('div'); grpHdr.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:4px;margin-top:8px;';
        const grpTitle=el('div','sec-lbl',`<i class="ti ti-checkbox" style="font-size:12px;"></i> ${grp.name}`); grpTitle.style.margin='0;flex:1;';
        const grpPctEl=el('div'); grpPctEl.style.cssText='font-size:11px;color:var(--text4);font-weight:600;'; grpPctEl.textContent=`${grpDone}/${grpTotal}`;
        const delGrp=el('button'); delGrp.style.cssText='border:none;background:transparent;color:var(--text4);cursor:pointer;font-size:12px;'; delGrp.innerHTML='<i class="ti ti-x"></i>';
        delGrp.addEventListener('click',()=>{ card.checklists.splice(gi,1); renderChecklistSection(); });
        grpHdr.appendChild(grpTitle); grpHdr.appendChild(grpPctEl); grpHdr.appendChild(delGrp); clSection.appendChild(grpHdr);

        if(grpTotal>0){
          const bar=document.createElement('div'); bar.style.cssText='height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:8px;';
          const fill=document.createElement('div'); fill.style.cssText=`height:100%;background:#059669;border-radius:2px;width:${grpPct}%;`;
          bar.appendChild(fill); clSection.appendChild(bar);
        }

        grp.items.forEach((item,ii)=>{
          const row=document.createElement('div'); row.className='op-checklist-item';
          const cb=document.createElement('input'); cb.type='checkbox'; cb.className='op-check-cb'; cb.checked=item.done;
          cb.addEventListener('change',()=>{ card.checklists[gi].items[ii].done=cb.checked; renderChecklistSection(); });
          const txt=document.createElement('span'); txt.className='op-check-txt'+(item.done?' done':''); txt.textContent=item.text;
          const del=document.createElement('button'); del.className='op-check-del'; del.innerHTML='<i class="ti ti-x"></i>';
          del.addEventListener('click',()=>{ card.checklists[gi].items.splice(ii,1); renderChecklistSection(); });
          row.appendChild(cb); row.appendChild(txt); row.appendChild(del); clSection.appendChild(row);
        });
      });
    }

    // ── Itens manuais ──
    const validItems=(card.checklist||[]).filter(i=>i.text||i._editing);
    if(validItems.length>0){
      const manHdr=document.createElement('div'); manHdr.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:4px;margin-top:8px;';
      const manTitle=el('div','sec-lbl','<i class="ti ti-list" style="font-size:12px;"></i> Itens manuais'); manTitle.style.margin='0';
      const manDone=validItems.filter(i=>i.done&&i.text).length;
      const manTotal=validItems.filter(i=>i.text).length;
      const manPct=el('div'); manPct.style.cssText='font-size:11px;color:var(--text4);font-weight:600;'; manPct.textContent=`${manDone}/${manTotal}`;
      manHdr.appendChild(manTitle); manHdr.appendChild(manPct); clSection.appendChild(manHdr);
      if(manTotal>0){
        const bar=document.createElement('div'); bar.style.cssText='height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:8px;';
        const fill=document.createElement('div'); fill.style.cssText=`height:100%;background:#059669;border-radius:2px;width:${Math.round(manDone/manTotal*100)}%;`;
        bar.appendChild(fill); clSection.appendChild(bar);
      }
    }

    (card.checklist||[]).forEach((item,i)=>{
      if(item._editing){
        const row=document.createElement('div'); row.style.cssText='display:flex;gap:6px;margin-bottom:4px;';
        const editInp=document.createElement('input'); editInp.value=item.text;
        editInp.placeholder='Nome do item...';
        editInp.style.cssText='flex:1;border:1px solid var(--blue);border-radius:6px;padding:6px 9px;font-size:12px;font-family:\'DM Sans\',sans-serif;color:var(--text1);background:var(--input-bg);outline:none;';
        const okBtn=document.createElement('button');
        okBtn.style.cssText='background:var(--blue);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:\'DM Sans\',sans-serif;';
        okBtn.textContent='OK';
        const confirmItem=()=>{
          const v=editInp.value.trim();
          if(v){ card.checklist[i].text=v; delete card.checklist[i]._editing; }
          else { card.checklist.splice(i,1); }
          renderChecklistSection();
        };
        okBtn.addEventListener('click',confirmItem);
        editInp.addEventListener('keydown',e=>{
          if(e.key==='Enter'){ e.preventDefault(); confirmItem(); }

const WPP_API   = 'https://api.somosvalor.com';
const WPP_KEY   = 'valorcrm2025';
const WPP_INST  = 'Valor-CRM';
const WPP_HEADS = {'Content-Type':'application/json','apikey':WPP_KEY};

let wppCurrentChat=null, wppChats=[], wppMsgCache={}, wppPollTimer=null, wppStatusTimer=null;
let wppMediaRecorder=null, wppAudioChunks=[], wppRecording=false;

function wppFmt(ts){ if(!ts) return ''; const d=new Date(ts*1000||ts); return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function wppFmtDate(ts){ if(!ts) return ''; const d=new Date(ts*1000||ts); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }
function wppInitials(name){ return (name||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function wppColors(name){ const colors=['#2563EB','#059669','#D97706','#7C3AED','#DC2626','#0891B2']; let h=0; for(const c of name||'') h=(h*31+c.charCodeAt(0))%colors.length; return colors[Math.abs(h)]; }

async function wppFetch(path, opts={}){
  try{ const r=await fetch(WPP_API+path,{...opts,headers:{...WPP_HEADS,...(opts.headers||{})}}); return await r.json(); }
  catch(e){ return null; }
}

async function initWpp(){
  await checkWppStatus();
  await loadWppChats();
  clearInterval(wppPollTimer);
  wppPollTimer=setInterval(()=>{ loadWppChats(); if(wppCurrentChat) loadWppMessages(wppCurrentChat,false); },8000);
  clearInterval(wppStatusTimer);
  wppStatusTimer=setInterval(checkWppStatus,30000);
  document.getElementById('wpp-refresh-btn').onclick=()=>{ loadWppChats(); if(wppCurrentChat) loadWppMessages(wppCurrentChat,true); };
  document.getElementById('wpp-config-btn').onclick=openWppConfig;
  document.getElementById('wpp-search').oninput=e=>filterWppChats(e.target.value);
}

async function checkWppStatus(){
  const dot=document.getElementById('wpp-status-dot');
  const txt=document.getElementById('wpp-status-txt');
  if(!dot) return;
  const d=await wppFetch(`/instance/connectionState/${WPP_INST}`);
  const state=d?.instance?.state||d?.state||'unknown';
  if(state==='open'){ dot.className='wpp-status-dot connected'; txt.textContent='Conectado'; }
  else if(state==='connecting'){ dot.className='wpp-status-dot'; txt.textContent='Conectando...'; }
  else { dot.className='wpp-status-dot disconnected'; txt.textContent='Desconectado — clique em Configurações para conectar'; }
}

async function loadWppChats(){
  const d=await wppFetch(`/chat/findChats/${WPP_INST}`);
  if(!d) return;
  const chats=Array.isArray(d)?d:(d.chats||d.data||[]);
  if(!Array.isArray(chats)||!chats.length) return;
  wppChats=chats.sort((a,b)=>(b.lastMessage?.messageTimestamp||b.updatedAt||0)-(a.lastMessage?.messageTimestamp||a.updatedAt||0));
  renderWppChatList(wppChats);
  updateWppBadge();
}

function updateWppBadge(){
  const total=wppChats.reduce((s,c)=>s+(c.unreadCount||0),0);
  const badge=document.getElementById('wpp-badge');
  if(!badge) return;
  badge.style.display=total>0?'inline':'none';
  badge.textContent=total>9?'9+':total;
}

function filterWppChats(q){
  const filtered=q?wppChats.filter(c=>(c.name||c.pushName||c.id?.user||'').toLowerCase().includes(q.toLowerCase())):wppChats;
  renderWppChatList(filtered);
}

function renderWppChatList(chats){
  const list=document.getElementById('wpp-conv-list'); if(!list) return; list.innerHTML='';
  if(!chats.length){ list.innerHTML='<div class="wpp-empty">Nenhuma conversa ainda.<br>Conecte seu WhatsApp nas configurações.</div>'; return; }
  chats.forEach(chat=>{
    const chatId=chat.id?.user||chat.id||'';
    const name=chat.name||chat.pushName||'+'+chatId||'Desconhecido';
    const lastMsg=chat.lastMessage?.message;
    const preview=lastMsg?.conversation||lastMsg?.extendedTextMessage?.text||lastMsg?.audioMessage?'🎵 Áudio':lastMsg?.imageMessage?'📷 Imagem':lastMsg?.documentMessage?'📄 Documento':'';
    const ts=chat.lastMessage?.messageTimestamp||chat.updatedAt;
    const unread=chat.unreadCount||0;
    const item=document.createElement('div');
    item.className='wpp-conv-item'+(wppCurrentChat===chat.id?' active':'')+(unread>0?' unread':'');
    const av=document.createElement('div'); av.className='wpp-conv-avatar'; av.style.background=wppColors(name); av.textContent=wppInitials(name);
    const info=document.createElement('div'); info.className='wpp-conv-info';
    const nm=document.createElement('div'); nm.className='wpp-conv-name'; nm.textContent=name;
    const pv=document.createElement('div'); pv.className='wpp-conv-preview'; pv.textContent=preview||'';
    info.appendChild(nm); info.appendChild(pv);
    const meta=document.createElement('div'); meta.className='wpp-conv-meta';
    const timeDiv=document.createElement('div'); timeDiv.className='wpp-conv-time'; timeDiv.textContent=ts?wppFmtDate(ts):'';
    meta.appendChild(timeDiv);
    if(unread>0){ const badge=document.createElement('div'); badge.className='wpp-unread-badge'; badge.textContent=unread>9?'9+':unread; meta.appendChild(badge); }
    item.appendChild(av); item.appendChild(info); item.appendChild(meta);
    item.addEventListener('click',()=>openWppChat(chat, item));
    list.appendChild(item);
  });
}

async function openWppChat(chat, itemEl){
  wppCurrentChat=chat.id;
  document.getElementById('wpp-chat-empty').style.display='none';
  const active=document.getElementById('wpp-chat-active'); active.style.display='flex';
  const name=chat.name||chat.pushName||chat.id?.user||'';
  const hdr=document.getElementById('wpp-chat-hdr'); hdr.innerHTML='';
  const av=document.createElement('div'); av.className='wpp-chat-av'; av.style.background=wppColors(name); av.textContent=wppInitials(name);
  const info=document.createElement('div');
  const nm=document.createElement('div'); nm.className='wpp-chat-name'; nm.textContent=name;
  const num=document.createElement('div'); num.className='wpp-chat-num'; num.textContent='+'+(chat.id?.user||'');
  info.appendChild(nm); info.appendChild(num);
  hdr.appendChild(av); hdr.appendChild(info);
  document.querySelectorAll('.wpp-conv-item').forEach(i=>i.classList.remove('active'));
  if(itemEl) itemEl.classList.add('active');
  buildWppInputArea(chat);
  await wppFetch(`/chat/markMessageAsRead/${WPP_INST}`,{method:'POST',body:JSON.stringify({readMessages:[{id:chat.id?.user||chat.id,fromMe:false}]})});
  await loadWppMessages(chat.id, true);
}

async function loadWppMessages(chatId, scroll=true){
  const remoteJid=typeof chatId==='object'?chatId._serialized||chatId.user:chatId;
  const d=await wppFetch(`/chat/findMessages/${WPP_INST}`,{method:'POST',body:JSON.stringify({where:{key:{remoteJid}},limit:50})});
  const msgs=d?.messages?.records||d?.records||d?.messages||[];
  if(!Array.isArray(msgs)) return;
  // Ordena por timestamp crescente (mais antiga primeiro)
  msgs.sort((a,b)=>(a.messageTimestamp||0)-(b.messageTimestamp||0));
  renderWppMessages(msgs, scroll);
}

function renderWppMessages(msgs, scroll){
  const box=document.getElementById('wpp-messages'); if(!box) return; box.innerHTML='';
  let lastDate='';
  msgs.forEach(msg=>{
    const ts=msg.messageTimestamp||msg.key?.timestamp;
    const dateLabel=ts?new Date(ts*1000).toLocaleDateString('pt-BR'):'';
    if(dateLabel&&dateLabel!==lastDate){ const dv=document.createElement('div'); dv.className='wpp-date-divider'; dv.innerHTML=`<span>${dateLabel}</span>`; box.appendChild(dv); lastDate=dateLabel; }
    const wrap=document.createElement('div'); const fromMe=msg.key?.fromMe;
    wrap.className='wpp-bubble-wrap '+(fromMe?'out':'in');
    const bubble=document.createElement('div'); bubble.className='wpp-bubble '+(fromMe?'out':'in');
    const mc=msg.message;
    if(!mc){ return; }
    if(mc.conversation||mc.extendedTextMessage){
      const txt=mc.conversation||mc.extendedTextMessage?.text||'';
      bubble.innerHTML=`<div>${txt.replace(/\n/g,'<br>')}</div>`;
    } else if(mc.audioMessage){
      const audioEl=new Audio(); let speeds=[1,1.5,2]; let si=0;
      const aWrap=document.createElement('div'); aWrap.className='wpp-bubble-audio';
      const playBtn=document.createElement('button'); playBtn.className='wpp-audio-btn'; playBtn.innerHTML='<i class="ti ti-player-play"></i>';
      const barWrap=document.createElement('div'); barWrap.className='wpp-audio-bar';
      const barFill=document.createElement('div'); barFill.className='wpp-audio-fill'; barWrap.appendChild(barFill);
      const secs=mc.audioMessage.seconds||0;

      playBtn.addEventListener('click',async()=>{
        if(!audioEl.src){ const md=await wppFetch(`/chat/getBase64FromMediaMessage/${WPP_INST}`,{method:'POST',body:JSON.stringify({message:{key:msg.key,message:mc},convertToMp4:false})}); if(md?.base64) audioEl.src=`data:audio/ogg;base64,${md.base64}`; }

      });
      audioEl.ontimeupdate=()=>{ if(audioEl.duration){ barFill.style.width=(audioEl.currentTime/audioEl.duration*100)+'%'; const r=audioEl.duration-audioEl.currentTime; dur.textContent=`${Math.floor(r/60)}:${String(Math.floor(r%60)).padStart(2,'0')}`; }};

      a.innerHTML=`<i class="ti ${iconCls}" style="font-size:26px;color:#DC2626;flex-shrink:0;"></i><div><div class="wpp-bubble-doc-name">${doc?.fileName||'Documento'}</div><div class="wpp-bubble-doc-size">Toque para baixar</div></div>`;
      a.addEventListener('click',async(e)=>{ e.preventDefault(); const md=await wppFetch(`/chat/getBase64FromMediaMessage/${WPP_INST}`,{method:'POST',body:JSON.stringify({message:{key:msg.key,message:mc}})}); if(md?.base64){ const lk=document.createElement('a'); lk.href=`data:${doc?.mimetype||'application/octet-stream'};base64,${md.base64}`; lk.download=doc?.fileName||'arquivo'; lk.click(); }});

    } else { bubble.innerHTML='<span style="font-size:11px;opacity:.5;">Mensagem não suportada</span>'; }

function buildWppInputArea(chat){
  const area=document.getElementById('wpp-input-area'); if(!area) return; area.innerHTML='';

async function sendWppText(chatId,text,textarea){
  const msg=(text||'').trim(); if(!msg) return;
  textarea.value=''; textarea.style.height='auto';
  const d=await wppFetch(`/message/sendText/${WPP_INST}`,{method:'POST',body:JSON.stringify({number:chatId,options:{delay:1200},textMessage:{text:msg}})});
  if(d) { await loadWppMessages(chatId,true); await loadWppChats(); } else showToast('Erro ao enviar mensagem');
}

async function sendWppFile(chatId,file){
  showLoading('Enviando arquivo...');
  const reader=new FileReader();
  reader.onload=async()=>{
    const base64=reader.result.split(',')[1]; const mime=file.type;
    const body={number:chatId,mediaMessage:{mediatype:mime.startsWith('image/')?'image':'document',media:base64,fileName:file.name,mimetype:mime}};
    const d=await wppFetch(`/message/sendMedia/${WPP_INST}`,{method:'POST',body:JSON.stringify(body)});
    hideLoading();
    if(d){ await loadWppMessages(chatId,true); await loadWppChats(); } else showToast('Erro ao enviar arquivo');
  };
  reader.readAsDataURL(file);
}

async function toggleWppRecording(chatId,micBtn){
  if(!wppRecording){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      wppAudioChunks=[]; wppMediaRecorder=new MediaRecorder(stream);
      wppMediaRecorder.ondataavailable=e=>wppAudioChunks.push(e.data);
      wppMediaRecorder.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(wppAudioChunks,{type:'audio/ogg; codecs=opus'});
        const reader=new FileReader();
        reader.onload=async()=>{ const base64=reader.result.split(',')[1]; showLoading('Enviando áudio...'); await wppFetch(`/message/sendWhatsAppAudio/${WPP_INST}`,{method:'POST',body:JSON.stringify({number:chatId,options:{delay:1200},audioMessage:{audio:base64,encoding:true}})}); hideLoading(); await loadWppMessages(chatId,true); };
        reader.readAsDataURL(blob);
      };
      wppMediaRecorder.start(); wppRecording=true;
      micBtn.innerHTML='<i class="ti ti-microphone-off" style="color:#DC2626;"></i>';
    } catch(e){ showToast('Permissão de microfone negada'); }
  } else { wppMediaRecorder?.stop(); wppRecording=false; micBtn.innerHTML='<i class="ti ti-microphone"></i>'; }
}

function openEditUser(key, user){
  // Modal de edição/criação de usuário
  const isNew=!key;
  const USER_COLORS=['#2563EB','#059669','#D97706','#7C3AED','#DC2626','#0891B2','#DB2777','#65A30D'];

  const mkField=(lbl,type,val,ph)=>{
    const w=document.createElement('div'); w.appendChild(el('div','lbl',lbl));
    const inp=document.createElement('input'); inp.type=type; inp.value=val||''; inp.placeholder=ph||''; inp.style.cssText=inpStyle;
    w.appendChild(inp); bd.appendChild(w); return inp;
  };

  const nmInp=mkField('Nome completo','text',user?.name,'Ex: João Silva');
  const usrInp=mkField('Usuário (para @menção)','text',user?.username||key,'Ex: joao');
  const emInp=mkField('E-mail','email',user?.email,'Ex: joao@empresa.com');
  const passInp=mkField(isNew?'Senha':'Nova senha (deixe em branco para manter)','password','',isNew?'Mínimo 6 caracteres':'');

  // Cor
  bd.appendChild(el('div','lbl','Cor do avatar'));
  const clWrap=document.createElement('div'); clWrap.style.cssText='display:flex;gap:8px;flex-wrap:wrap;';
  let selColor=user?.color||USER_COLORS[0];
  USER_COLORS.forEach(c=>{ const d=document.createElement('div'); d.style.cssText=`width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${c===selColor?'var(--text1)':'transparent'};transition:border-color .1s;`; d.addEventListener('click',()=>{ selColor=c; clWrap.querySelectorAll('div').forEach((x,i)=>x.style.borderColor=USER_COLORS[i]===selColor?'var(--text1)':'transparent'); }); clWrap.appendChild(d); });
  bd.appendChild(clWrap);

  // Role
  bd.appendChild(el('div','lbl','Tipo de acesso'));
  const roleWrap=document.createElement('div'); roleWrap.style.cssText='display:flex;gap:8px;';
  let selRole=user?.role||'user';
  ['admin','user'].forEach(r=>{ const btn=document.createElement('button'); const isSelR=r===selRole; btn.style.cssText=`padding:6px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:2px solid ${isSelR?'var(--blue)':'var(--border)'};background:${isSelR?'#EFF6FF':'transparent'};color:${isSelR?'var(--blue)':'var(--text3)'};`; btn.textContent=r==='admin'?'Admin':'Usuário';
    btn.addEventListener('click',()=>{ selRole=r; roleWrap.querySelectorAll('button').forEach((b,i)=>{ const rr=['admin','user'][i]; b.style.borderColor=rr===selRole?'var(--blue)':'var(--border)'; b.style.background=rr===selRole?'#EFF6FF':'transparent'; b.style.color=rr===selRole?'var(--blue)':'var(--text3)'; }); });
    roleWrap.appendChild(btn); });
  bd.appendChild(roleWrap);

  modal.appendChild(bd);

  const ft=document.createElement('div'); ft.style.cssText='padding:.875rem 1.4rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;';
  const canB=document.createElement('button'); canB.style.cssText='padding:7px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;font-family:\'DM Sans\',sans-serif;'; canB.textContent='Cancelar'; canB.addEventListener('click',()=>overlay.remove());

    if(email&&!email.includes('@')){ showToast('E-mail inválido.'); return; }
    // Verifica duplicidade de username (exceto o próprio)
    const dupKey=Object.keys(USERS).find(k=>k!==key&&(USERS[k].username===username||USERS[k].email===email));
    if(dupKey){ showToast('Usuário ou e-mail já cadastrado.'); return; }
    const newKey=isNew?username:key;
    const existing=isNew?{}:{...user};
    USERS[newKey]={
      ...existing,
      name, username, email,
      pass:pass||existing.pass,
      role:selRole,
      color:selColor,
      bg:selColor+'22',
      init:name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(),
      perms:existing.perms||{pipeline:true,faturamento:true}
    };
    if(!isNew&&key!==newKey){ delete USERS[key]; }
    overlay.remove(); apiSave(); _renderUsuarios(); showToast(isNew?'Usuário criado!':'Usuário atualizado!');
  });
  ft.appendChild(canB); ft.appendChild(savB); modal.appendChild(ft);
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  nmInp.focus();
}

  const layout=el('div'); layout.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start;';

  // LEFT — Upload
  const left=el('div');
  const leftTitle=el('div','sec-lbl','<i class="ti ti-upload" style="font-size:13px;"></i> Upload do PDF');
  left.appendChild(leftTitle);

  const desc=el('div'); desc.style.cssText='background:var(--blue-light);border:1px solid #BFDBFE;border-radius:10px;padding:12px 14px;margin-bottom:1rem;font-size:12px;color:#1E40AF;line-height:1.6;';
  desc.innerHTML='Exporte o <strong>REN01</strong> do SGCOR e faça o upload abaixo. A IA irá extrair todos os segurados e preparar os cards para importação.';
  left.appendChild(desc);

  const uploadWrap=el('div'); uploadWrap.style.cssText='border:2px dashed var(--border);border-radius:12px;padding:2rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--upload-bg);color:var(--text3);';
  uploadWrap.innerHTML=`<i class="ti ti-file-type-pdf" style="font-size:40px;color:var(--text4);display:block;margin-bottom:8px;"></i>
    <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:4px;">Arraste o PDF aqui</div>
    <div style="font-size:11px;color:var(--text4);margin-bottom:12px;">ou clique para selecionar</div>
    <div style="display:inline-block;background:var(--blue);color:#fff;padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;">Selecionar arquivo</div>`;

  const fileInput=document.createElement('input'); fileInput.type='file'; fileInput.accept='.pdf'; fileInput.style.display='none';
  uploadWrap.addEventListener('click',()=>fileInput.click());
  uploadWrap.addEventListener('dragover',e=>{e.preventDefault();uploadWrap.style.borderColor='#2563EB';uploadWrap.style.background='#EFF6FF';});
  uploadWrap.addEventListener('dragleave',()=>{uploadWrap.style.borderColor='#D1D5DB';uploadWrap.style.background='#FAFAFA';});
  uploadWrap.addEventListener('drop',e=>{
    e.preventDefault();uploadWrap.style.borderColor='#D1D5DB';uploadWrap.style.background='#FAFAFA';
    if(e.dataTransfer.files[0]) processRenovacaoPDF(e.dataTransfer.files[0], right, importBtn);
  });
  fileInput.addEventListener('change',()=>{ if(fileInput.files[0]) processRenovacaoPDF(fileInput.files[0], right, importBtn); });
  left.appendChild(uploadWrap); left.appendChild(fileInput);

  // RIGHT — Preview panel
  const right=el('div');
  right.style.cssText='background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem;min-height:300px;';
  const rightEmpty=el('div'); rightEmpty.style.cssText='text-align:center;padding:3rem 1rem;color:var(--text4);';
  rightEmpty.innerHTML=`<i class="ti ti-file-search" style="font-size:36px;display:block;margin-bottom:8px;opacity:.4;"></i>
    <div style="font-size:13px;font-weight:500;">Os negócios extraídos<br>aparecerão aqui</div>`;
  right.appendChild(rightEmpty);

  layout.appendChild(left); layout.appendChild(right); body.appendChild(layout);

  // Import button — hidden initially
  const importBtn=null;
}

async function processRenovacaoPDF(file, previewPanel, importBtn){
  previewPanel.innerHTML=`
    <div style="text-align:center;padding:2rem;">
      <div style="margin-bottom:8px;"><i class="ti ti-robot" style="font-size:32px;color:var(--blue);"></i></div>
      <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:4px;">Processando PDF...</div>
      <div style="font-size:11px;color:var(--text4);margin-bottom:12px;">A IA está extraindo os dados</div>
      <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
        <div id="prog-bar" style="height:100%;background:var(--blue);border-radius:2px;width:0%;transition:width .3s;"></div>
      </div>
    </div>`;

  let prog=0; const progInt=setInterval(()=>{ prog=Math.min(prog+2,85); const pb=document.getElementById('prog-bar'); if(pb) pb.style.width=prog+'%'; },100);

  try {
    // Step 1: Upload PDF to OpenAI Files API
    const formData=new FormData();
    formData.append('file', file, file.name);
    formData.append('purpose','assistants');

    const uploadResp=await fetch('https://api.openai.com/v1/files',{
      method:'POST',
      headers:{'Authorization':'Bearer '+OPENAI_KEY},
      body:formData
    });
    const uploadData=await uploadResp.json();
    if(!uploadResp.ok) throw new Error(uploadData.error?.message||'Erro ao enviar PDF');
    const fileId=uploadData.id;

    // Step 2: Call GPT-4o with file
    const prompt=`Analise este PDF do Relatório de Renovações REN01 do sistema SGCOR e extraia TODOS os registros de renovação.

Para cada registro retorne um JSON com este formato exato:
{
  "renovacoes": [
    {
      "nome": "Nome capitalizado (primeira letra maiúscula de cada palavra)",
      "ramo": "Ramo exato do PDF (ex: AUTOMÓVEL, RESIDENCIAL, VIDA INDIVIDUAL)",
      "companhia": "Nome da seguradora",
      "vencimento": "DD/MM/AAAA",
      "premio_liquido": "número decimal com ponto ex: 1234.56",
      "apolice": "número da apólice"
    }
  ]
}

Inclua TODOS os registros mesmo com prêmio 0,00. Retorne APENAS o JSON puro, sem markdown, sem texto adicional.`;

    const resp=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+OPENAI_KEY},
      body:JSON.stringify({
        model:'gpt-4o',
        max_tokens:8192,
        messages:[{
          role:'user',
          content:[
            {type:'text',text:prompt},
            {type:'file',file:{file_id:fileId}}
          ]
        }]
      })
    });

    const data=await resp.json();
    clearInterval(progInt);

    // Cleanup: delete uploaded file
    fetch('https://api.openai.com/v1/files/'+fileId,{method:'DELETE',headers:{'Authorization':'Bearer '+OPENAI_KEY}});

    if(!resp.ok||data.error) throw new Error(data.error?.message||'Erro na API OpenAI');

    const text=data.choices?.[0]?.message?.content||'';
    const clean=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    const renovacoes=parsed.renovacoes||[];
    if(renovacoes.length===0) throw new Error('Nenhum registro encontrado');

    showRenovacoesPreview(renovacoes, previewPanel, importBtn);

  } catch(e){
    clearInterval(progInt);
    previewPanel.innerHTML=`<div style="padding:1rem;text-align:center;">
      <div style="margin-bottom:8px;"><i class="ti ti-circle-x" style="font-size:28px;color:#DC2626;"></i></div>
      <div style="font-size:13px;font-weight:600;color:#DC2626;margin-bottom:4px;">Erro ao processar</div>
      <div style="font-size:11px;color:#EF4444;">${e.message}</div>
    </div>`;
  }
}

function showRenovacoesPreview(renovacoes, panel, importBtn){
  panel.innerHTML='';

  const total=renovacoes.length;
  const totalPremio=renovacoes.reduce((s,r)=>s+(parseFloat(r.premio_liquido)||0),0);

  // Summary cards
  const sg=el('div'); sg.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;';
  function sc(lbl,val,color){
    const c=el('div'); c.style.cssText=`background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;`;
    c.innerHTML=`<div style="font-size:9px;font-weight:600;color:var(--text4);text-transform:uppercase;margin-bottom:2px;">${lbl}</div><div style="font-size:16px;font-weight:700;color:${color};">${val}</div>`;
    return c;
  }
  sg.appendChild(sc('Negócios',total,'#2563EB'));
  sg.appendChild(sc('Prêmio Total',fmt(totalPremio),'#059669'));
  panel.appendChild(sg);

  // Title
  const t=el('div','sec-lbl','Negócios extraídos'); panel.appendChild(t);

  // List
  const list=el('div'); list.style.cssText='max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;';
  renovacoes.forEach(r=>{
    const ramo=(r.ramo||'').toLowerCase();
    const isNalberty=ramo.includes('auto')||ramo.includes('moto')||ramo.includes('resid');
    const resp=isNalberty?'N':'A';
    const respColor=isNalberty?'#059669':'#2563EB';
    const respBg=isNalberty?'#ECFDF5':'#EFF6FF';

    const item=el('div'); item.style.cssText='background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;';
    item.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;">
        <div style="font-size:12px;font-weight:600;color:var(--text1);">${r.nome||'—'}</div>
        <span style="background:${respBg};color:${respColor};border-radius:999px;padding:1px 8px;font-size:10px;font-weight:700;">${isNalberty?'Nalberty':'Admin'}</span>
      </div>
      <div style="font-size:10px;color:var(--text3);">${r.ramo||'—'} · ${r.companhia||'—'}</div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;">
        <span style="font-size:10px;color:var(--text4);">Venc: ${r.vencimento||'—'}</span>
        <span style="font-size:11px;font-weight:600;color:#059669;">${fmt(parseFloat(r.premio_liquido)||0)}</span>
      </div>`;
    list.appendChild(item);
  });
  panel.appendChild(list);

  // Show import button inside panel
  let savedRenovacoes=renovacoes;
  const panelImportBtn=el('button','save-btn'); panelImportBtn.style.cssText='margin-top:12px;width:100%;';
  panelImportBtn.innerHTML='<i class="ti ti-plus"></i> Importar para o Pipeline';
  panelImportBtn.onclick=()=>importarRenovacoes(savedRenovacoes, panelImportBtn, panel);
  panel.appendChild(panelImportBtn);
  // Only show panel button, remove external button
  // external btn handled above
}

async function importarRenovacoes(renovacoes, btn, panel){
  btn.disabled=true; btn.textContent='Fazendo backup e importando...';
  try {
    // 1. Busca dados frescos do Worker
    const loadResp=await fetch(CF_WORKER,{method:'GET'});
    if(!loadResp.ok) throw new Error('Erro ao carregar dados: HTTP '+loadResp.status);
    const dadosAtuais=await loadResp.json();
    const leadsExistentes=dadosAtuais.leads||[];

    // 3. Cria novos leads
    const today=dateStr(); const now=nowStr();
    const novosLeads=renovacoes.map(r=>{
      const ramo=(r.ramo||'').toLowerCase();
      const isNalberty=ramo.includes('auto')||ramo.includes('moto')||ramo.includes('resid');
      const owner=isNalberty?'nalberty':'admin';
      let product='Outros';
      if(ramo.includes('auto')||ramo.includes('moto')) product='Automóvel';
      else if(ramo.includes('resid')) product='Residência';
      else if(ramo.includes('vida')) product='Vida';
      else if(ramo.includes('saúde')||ramo.includes('saude')) product='Saúde';
      else if(ramo.includes('viagem')) product='Viagem';
      else if(ramo.includes('empresa')) product='Empresarial';
      return {
        id:'l'+Date.now()+Math.random().toString(36).substr(2,9),
        name:r.nome||'Sem nome', dealName:r.ramo||'',
        product, insuranceType:'Renovação Própria',
        col:'lead', value:parseFloat(r.premio_liquido)||0,
        commPct:15, repVendPct:0, repProdPct:0, owner,
        phone:'', obs:'Vencimento: '+(r.vencimento||'—')+' | Prêmio Líq.: '+fmt(parseFloat(r.premio_liquido)||0)+' | Apólice: '+(r.apolice||'—')+' | Cia: '+(r.companhia||'—'),
        tags:[], tasks:[], mentionNalberty:false,
        activities:[{type:'save',text:'Lead importado via Ferramentas IA — Relatório de Renovações',by:currentUser,when:today+' · '+now}]
      };
    });

    // 4. ADICIONA ao que já existe (nunca substitui)
    const todosLeads=[...leadsExistentes, ...novosLeads];

    // 5. Salva no Worker
    showLoading();
    const saveResp=await fetch(CF_WORKER,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({...dadosAtuais, leads:todosLeads})
    });
    if(!saveResp.ok) throw new Error('Erro ao salvar: HTTP '+saveResp.status);
    hideLoading();

    // 6. Atualiza memória
    allLeads=todosLeads;
    btn.style.background='#059669';
    btn.innerHTML='<i class="ti ti-check"></i> '+renovacoes.length+' cards criados!';
    btn.disabled=true;
    renderAll();
    showToast(renovacoes.length+' renovações importadas! Backup salvo.');
    setTimeout(()=>{
      const link=el('div'); link.style.cssText='text-align:center;margin-top:8px;';
      const a=el('button','save-btn'); a.style.cssText='background:#7C3AED;display:inline-flex;width:auto;padding:8px 20px;';
      a.innerHTML='<i class="ti ti-layout-kanban"></i> Ver no Pipeline';
      a.addEventListener('click',()=>document.querySelector('[data-page="pipeline"]').click());
      link.appendChild(a); panel.appendChild(link);
    },400);
  } catch(e){
    hideLoading();
    btn.disabled=false; btn.style.background='';
    btn.innerHTML='<i class="ti ti-plus"></i> Importar para o Pipeline';
    const errDiv=el('div'); errDiv.style.cssText='background:var(--tag-orange-bg,#FEF2F2);border:1px solid #FCA5A5;border-radius:8px;padding:10px;margin-top:8px;font-size:12px;color:#DC2626;';
    errDiv.textContent='Erro: '+e.message; panel.appendChild(errDiv);
  }
}


function abrirModalRespostas(l){
  // Remove existing modal if any
  const existing=document.getElementById('form-resp-modal');
  if(existing) existing.remove();

  const overlay=el('div'); overlay.id='form-resp-modal';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;';

  const box=el('div'); box.style.cssText='background:var(--surface);border-radius:16px;width:min(580px,95vw);max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);';

  // Header
  const hdr=el('div'); hdr.style.cssText='padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;';
  const htitle=el('div'); htitle.style.cssText='font-size:15px;font-weight:600;color:var(--text1);';
  htitle.innerHTML='<i class="ti ti-clipboard-text" style="color:var(--blue);margin-right:6px;"></i> Respostas do Formulário';
  const closeBtn=el('button'); closeBtn.innerHTML='<i class="ti ti-x"></i>'; closeBtn.style.cssText='background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);padding:4px;';
  closeBtn.addEventListener('click',()=>overlay.remove());
  hdr.appendChild(htitle); hdr.appendChild(closeBtn); box.appendChild(hdr);

  // Respostas
  const body=el('div'); body.style.cssText='padding:1.25rem 1.5rem;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:10px;';
  const respostas=l.formRespostas||[];
  respostas.forEach(r=>{
    const item=el('div'); item.style.cssText='background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;';
    item.innerHTML=`<div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;">${r.pergunta}</div>
      <div style="font-size:13px;color:var(--text1);font-weight:500;">${r.resposta||'—'}</div>`;
    body.appendChild(item);
  });
  box.appendChild(body);

  // Footer com botão copiar tudo
  const footer=el('div'); footer.style.cssText='padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:8px;';
  const copyBtn=el('button','save-btn'); copyBtn.style.cssText='flex:1;';
  copyBtn.innerHTML='<i class="ti ti-copy"></i> Copiar tudo formatado';
  copyBtn.addEventListener('click',()=>{
    const texto=respostas.map(r=>r.pergunta+':: '+r.resposta).join('\n');
    navigator.clipboard.writeText(texto).then(()=>{ copyBtn.innerHTML='<i class="ti ti-check"></i> Copiado!'; setTimeout(()=>{ copyBtn.innerHTML='<i class="ti ti-copy"></i> Copiar tudo formatado'; },2000); });
  });
  footer.appendChild(copyBtn); box.appendChild(footer);

  overlay.appendChild(box);
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}
