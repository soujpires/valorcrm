<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232563EB'/%3E%3Cpath d='M50 15 L20 28 L20 52 C20 68 34 80 50 85 C66 80 80 68 80 52 L80 28 Z' fill='white' opacity='.9'/%3E%3Cpolyline points='38,48 50,62 62,48' fill='none' stroke='%232563EB' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cline x1='50' y1='62' x2='50' y2='70' stroke='%232563EB' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valor CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

/* ── TEMA: variáveis ── */
:root{
  --bg:#F3F4F6;--bg2:#F9FAFB;--surface:#fff;
  --border:#E5E7EB;--border2:#F3F4F6;
  --text1:#111827;--text2:#374151;--text3:#6B7280;--text4:#9CA3AF;
  --blue:#2563EB;--blue-light:#EFF6FF;
  --shadow:rgba(0,0,0,.06);
  --input-bg:#fff;
  --modal-bg:#fff;
  --card-bg:#fff;
  --select-bg:#fff;
  --tag-green-bg:#ECFDF5;--tag-green-border:#A7F3D0;--tag-green-color:#059669;
  --tag-purple-bg:#F5F3FF;--tag-purple-color:#7C3AED;
  --tag-orange-bg:#FFF7ED;--tag-orange-color:#EA580C;
  --tag-yellow-bg:#FFFBEB;--tag-yellow-color:#D97706;
  --upload-bg:#FAFAFA;
}
html.dark{
  --bg:#0F1117;--bg2:#161B27;--surface:#1E2433;
  --border:#2A3348;--border2:#232B3E;
  --text1:#F1F5F9;--text2:#CBD5E1;--text3:#94A3B8;--text4:#64748B;
  --blue:#3B82F6;--blue-light:#1E3A5F;
  --shadow:rgba(0,0,0,.3);
  --input-bg:#161B27;
  --modal-bg:#1E2433;
  --card-bg:#1E2433;
  --select-bg:#161B27;
  --tag-green-bg:#052e16;--tag-green-border:#166534;--tag-green-color:#4ade80;
  --tag-purple-bg:#2e1065;--tag-purple-color:#c084fc;
  --tag-orange-bg:#431407;--tag-orange-color:#fb923c;
  --tag-yellow-bg:#422006;--tag-yellow-color:#fbbf24;
  --upload-bg:#161B27;
}
/* Garante que inputs, selects e textareas herdam o tema no dark */
html.dark input, html.dark select, html.dark textarea{
  background:var(--input-bg)!important;
  color:var(--text1)!important;
  border-color:var(--border)!important;
  color-scheme:dark;
}
html.dark .stage-sel, html.dark .inp{background:var(--input-bg)!important;color:var(--text1)!important;}
html.dark .modal{background:var(--modal-bg)!important;}
html.dark .card{background:var(--card-bg)!important;}
/* Tooltips e overlays */
html.dark .overlay{background:rgba(0,0,0,.65);}
/* Scrollbars no dark */
html.dark ::-webkit-scrollbar-thumb{background:#2A3348;}
html.dark ::-webkit-scrollbar-track{background:#0F1117;}

html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text1);font-size:14px;transition:background .2s,color .2s;}

/* ── OPERACIONAL BOARD ── */
.op-board{display:flex;flex:1;overflow-x:auto;padding:.75rem 1rem;gap:12px;align-items:flex-start;}
.op-board::-webkit-scrollbar{height:6px;}
.op-board::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.op-col{min-width:272px;max-width:272px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;max-height:calc(100vh - 140px);}
.op-col-hdr{padding:.75rem 1rem;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.op-col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.op-col-name{font-size:13px;font-weight:600;color:var(--text1);flex:1;}
.op-col-cnt{font-size:11px;font-weight:600;background:var(--bg);border:1px solid var(--border);color:var(--text3);border-radius:999px;padding:1px 7px;}
.op-col-menu{background:transparent;border:none;cursor:pointer;color:var(--text4);padding:3px;font-size:14px;display:flex;align-items:center;}
.op-col-menu:hover{color:var(--text2);}
.op-col-body{flex:1;overflow-y:auto;padding:.5rem;display:flex;flex-direction:column;gap:6px;}
.op-col-body::-webkit-scrollbar{width:4px;}
.op-col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.op-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.65rem .75rem;cursor:pointer;box-shadow:0 1px 2px var(--shadow);transition:border-color .12s,box-shadow .12s;}
.op-card:hover{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.07);}
.op-card.dragging{opacity:.35;}
.op-col.drag-over .op-col-body{background:var(--blue-light);border-radius:8px;}
.op-card-label{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.op-label-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;}
.op-card-title{font-size:13px;font-weight:600;color:var(--text1);margin-bottom:6px;line-height:1.4;}
.op-card-desc{font-size:11.5px;color:var(--text3);margin-bottom:6px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.op-card-foot{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.op-card-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px;}
.op-card-meta.due-soon{color:#D97706;}
.op-card-meta.overdue{color:#DC2626;}
.op-checklist-bar{margin-bottom:6px;}
.op-checklist-prog{height:3px;background:var(--border);border-radius:999px;overflow:hidden;margin-bottom:2px;}
.op-checklist-fill{height:100%;background:#059669;border-radius:999px;}
.op-checklist-txt{font-size:10px;color:var(--text4);}
.op-add-col{min-width:240px;flex-shrink:0;}
.op-add-col-btn{width:100%;padding:.75rem;border:1.5px dashed var(--border);border-radius:12px;background:transparent;cursor:pointer;font-size:13px;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:6px;font-family:'DM Sans',sans-serif;transition:all .12s;}
.op-add-col-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light);}
.op-add-card-btn{margin:.3rem .5rem .5rem;padding:6px 8px;border:1px dashed var(--border);border-radius:8px;background:transparent;cursor:pointer;font-size:12px;color:var(--text4);display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;width:calc(100% - 1rem);}
.op-add-card-btn:hover{background:var(--surface);color:var(--text3);}
/* Modal Operacional */
.op-modal-body{padding:1.25rem 1.4rem;display:grid;grid-template-columns:1fr 200px;gap:1.25rem;}
.op-modal-main{display:flex;flex-direction:column;gap:14px;}
.op-modal-side{display:flex;flex-direction:column;gap:8px;}
.op-side-label{font-size:11px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.op-side-btn{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:12px;color:var(--text2);font-family:'DM Sans',sans-serif;width:100%;}
.op-side-btn:hover{background:var(--bg2);}
.op-checklist-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border2);}
.op-check-cb{width:15px;height:15px;cursor:pointer;flex-shrink:0;}
.op-check-txt{flex:1;font-size:13px;color:var(--text2);}
.op-check-txt.done{text-decoration:line-through;color:var(--text4);}
.op-check-del{background:transparent;border:none;cursor:pointer;color:var(--text4);font-size:13px;padding:2px;}
.op-check-del:hover{color:#DC2626;}
.op-label-dot{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.op-label-dot.selected{border-color:var(--text1);transform:scale(1.2);}

#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg2);z-index:999;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2.5rem;width:360px;box-shadow:0 4px 12px var(--shadow);}
.login-brand{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:2rem;}
.login-brand-dot{width:10px;height:10px;background:var(--blue);border-radius:50%;}
.login-brand-name{font-size:16px;font-weight:600;color:var(--text1);}
.login-title{font-size:22px;font-weight:600;text-align:center;margin-bottom:.25rem;color:var(--text1);}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:1.75rem;}
.lbl{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;}
.inp{display:block;width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text1);background:var(--surface);outline:none;transition:border .15s;}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.fw{margin-bottom:14px;}
.login-btn{width:100%;background:var(--blue);color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:4px;}
.login-btn:hover{background:#1D4ED8;}
.login-err{font-size:12px;color:#DC2626;text-align:center;margin-top:10px;min-height:18px;}

/* APP SHELL */
#app{display:none;flex-direction:column;height:100vh;}
.app-body{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s;flex-shrink:0;overflow:hidden;}
.sidebar.collapsed{width:52px;}
.sb-top{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem;border-bottom:1px solid var(--border2);min-height:52px;}
.sb-logo{display:flex;align-items:center;gap:8px;overflow:hidden;white-space:nowrap;}
.sb-dot{width:8px;height:8px;background:var(--blue);border-radius:50%;flex-shrink:0;}
.sb-name{font-size:14px;font-weight:600;color:var(--text1);transition:opacity .15s;}
.sidebar.collapsed .sb-name{opacity:0;pointer-events:none;}
.sb-toggle{background:transparent;border:none;cursor:pointer;color:var(--text4);padding:4px;border-radius:6px;display:flex;align-items:center;font-size:16px;flex-shrink:0;}
.sb-toggle:hover{background:var(--bg);color:var(--text2);}
.sb-menu{flex:1;padding:.5rem 0;}
.sb-item{display:flex;align-items:center;gap:10px;padding:.625rem 1rem;cursor:pointer;color:var(--text3);font-size:13px;font-weight:500;border-radius:0;transition:all .12s;white-space:nowrap;border:none;background:transparent;width:100%;font-family:'DM Sans',sans-serif;}
.sb-item:hover{background:var(--bg2);color:var(--text2);}
.sb-item.active{background:var(--blue-light);color:var(--blue);font-weight:600;}
.sb-item i{font-size:18px;flex-shrink:0;}
.sb-item span{overflow:hidden;transition:opacity .15s;}
.sidebar.collapsed .sb-item span{opacity:0;pointer-events:none;}
.sb-badge{background:#DC2626;color:#fff;border-radius:999px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:auto;flex-shrink:0;}
.sidebar.collapsed .sb-badge{display:none;}
.sb-bottom{padding:.75rem;border-top:1px solid var(--border2);}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:12px;height:52px;flex-shrink:0;box-shadow:0 1px 3px var(--shadow);}
.hpage{font-size:14px;color:var(--text3);}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px;}
.upill{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);border-radius:999px;padding:4px 12px 4px 4px;}
.uav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;}
.unm{font-size:13px;font-weight:500;color:var(--text2);}
.atag{background:#FFFBEB;color:#D97706;font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;border:1px solid #FDE68A;}
.vtabs{display:flex;background:var(--bg);border-radius:999px;padding:3px;gap:2px;}
.vtab{padding:3px 11px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;}
.vtab.active{background:var(--surface);color:var(--text1);box-shadow:0 1px 2px var(--shadow);}
.ibtn{border:1px solid var(--border);background:var(--surface);padding:5px 10px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--text3);display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;}
.ibtn:hover{background:var(--bg2);color:var(--text2);}
.bnew{background:var(--blue);color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;}
.bnew:hover{background:#1D4ED8;}

/* ACCORDION CONFIGURAÇÕES */
.cfg-accordion{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.cfg-acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);cursor:pointer;user-select:none;transition:background .12s;}
.cfg-acc-hdr:hover{background:var(--bg2);}
.cfg-acc-left{display:flex;align-items:center;gap:12px;}
.cfg-acc-icon{font-size:22px;color:var(--blue);}
.cfg-acc-title{font-size:14px;font-weight:600;color:var(--text1);}
.cfg-acc-sub{font-size:12px;color:var(--text3);margin-top:1px;}
.cfg-acc-chev{font-size:18px;color:var(--text4);transition:transform .25s;}
.cfg-acc-hdr.open .cfg-acc-chev{transform:rotate(180deg);}
.cfg-acc-body{display:none;padding:18px;border-top:1px solid var(--border2);background:var(--bg2);}
.cfg-acc-body.open{display:block;}

/* MAIN CONTENT */
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* METRICS */
.mbar{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:.75rem 1.25rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;transition:all .2s;}
.mbar.collapsed{padding:0;height:0;overflow:hidden;border-bottom:none;}
.metrics-toggle{display:flex;align-items:center;justify-content:center;background:var(--surface);border-bottom:1px solid var(--border);padding:3px;flex-shrink:0;}
.metrics-toggle-btn{background:transparent;border:none;cursor:pointer;color:var(--text4);padding:2px 8px;border-radius:4px;font-size:11px;display:flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;}
.metrics-toggle-btn:hover{color:var(--text2);}
.mc{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:.7rem .9rem;}
.mlbl{font-size:10px;font-weight:600;color:var(--text4);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
.mval{font-size:19px;font-weight:600;color:var(--text1);}
.msub{font-size:11px;color:var(--text4);margin-top:2px;}

/* BOARD */
.board{display:flex;overflow-x:auto;flex:1;}
.board::-webkit-scrollbar{height:6px;}
.board::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.col{min-width:238px;max-width:238px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--bg2);}
.cacc{height:3px;flex-shrink:0;}
.chdr{padding:.7rem .9rem;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.ctr{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.cnm{font-size:13px;font-weight:600;color:var(--text2);}
.cct{background:var(--bg);border:1px solid var(--border);border-radius:999px;font-size:11px;padding:1px 7px;color:var(--text3);font-weight:500;}
.cst{font-size:11px;color:var(--text4);}
.carea{flex:1;padding:.7rem;display:flex;flex-direction:column;gap:7px;overflow-y:auto;}
.ecol{border:1.5px dashed var(--border);border-radius:8px;padding:1.25rem 1rem;text-align:center;color:var(--text4);font-size:12px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
.caddbtn{margin:0 .7rem .7rem;padding:7px;border:1px dashed var(--border);border-radius:8px;background:transparent;cursor:pointer;font-size:12px;color:var(--text4);display:flex;align-items:center;justify-content:center;gap:5px;font-family:'DM Sans',sans-serif;}
.caddbtn:hover{background:var(--surface);color:var(--text3);}
.addcol-wrap{min-width:56px;display:flex;align-items:flex-start;padding:.7rem .4rem;border-right:1px solid var(--border);}
.addcol-btn{background:var(--surface);border:1px dashed var(--border);border-radius:8px;padding:8px 6px;cursor:pointer;font-size:11px;color:var(--text4);display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;height:68px;justify-content:center;width:100%;}
.addcol-btn:hover{border-color:var(--blue);color:var(--blue);}
.cedit-btn{background:transparent;border:none;cursor:pointer;color:#D1D5DB;padding:2px 3px;display:flex;align-items:center;font-size:13px;}
.cedit-btn:hover{color:var(--text3);}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.7rem;cursor:pointer;position:relative;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.card:hover{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.07);}
.card.dragging{opacity:.35;}
.col.drag-over .carea{background:var(--blue-light);border-radius:8px;}
.card-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:8px 0 0 8px;}
.card-name{font-size:13px;font-weight:600;color:var(--text1);margin-left:10px;margin-bottom:1px;}
.card-deal{font-size:11px;font-weight:500;color:var(--blue);margin-left:10px;margin-bottom:2px;}
.card-prod{font-size:11px;color:var(--text4);margin-left:10px;margin-bottom:6px;}
.card-val{font-size:13px;font-weight:600;color:var(--text2);margin-left:10px;}
.card-comm{font-size:11px;color:#059669;margin-left:10px;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.cpill{background:#ECFDF5;color:#059669;border-radius:999px;padding:1px 6px;font-size:10px;font-weight:600;border:1px solid #A7F3D0;}
.card-foot{display:flex;align-items:center;margin-left:10px;gap:5px;margin-top:5px;}
.pbar-wrap{flex:1;}
.pbar{height:3px;background:var(--bg);border-radius:999px;overflow:hidden;margin-bottom:2px;}
.pfill{height:100%;border-radius:999px;}
.ptxt{font-size:10px;color:var(--text4);}
.oav{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}
.mention-tag{background:#F5F3FF;color:#7C3AED;border-radius:999px;padding:1px 6px;font-size:10px;font-weight:600;margin-left:10px;display:inline-block;margin-bottom:2px;}
.task-due-tag{background:#FFF7ED;color:#EA580C;border-radius:999px;padding:1px 6px;font-size:10px;font-weight:500;margin-left:10px;display:inline-block;margin-bottom:2px;}

/* TASKS PAGE */
.tasks-page{flex:1;display:none;flex-direction:column;overflow:hidden;}
.tasks-page.visible{display:flex;}
.tasks-header{padding:1rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tasks-title{font-size:16px;font-weight:600;color:var(--text1);}
.task-tabs{display:flex;background:var(--bg);border-radius:999px;padding:3px;gap:2px;margin:.875rem 1.25rem 0;flex-shrink:0;}
.task-tab{padding:6px 18px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;}
.task-tab.active{background:var(--surface);color:var(--text1);box-shadow:0 1px 2px rgba(0,0,0,.08);}
.tasks-body{flex:1;overflow-y:auto;padding:1rem 1.25rem;}
.task-list-wrap{display:flex;flex-direction:column;gap:8px;}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.875rem 1rem;display:flex;align-items:flex-start;gap:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.task-circle{width:22px;height:22px;border-radius:50%;border:2px solid #D1D5DB;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;margin-top:1px;}
.task-circle.done{background:var(--blue);border-color:var(--blue);color:#fff;}
.task-circle.inprogress{background:#F59E0B;border-color:#F59E0B;color:#fff;}
/* TAGS */
.tag-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:600;margin-left:10px;margin-bottom:3px;}
.tag-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.tags-wrap{display:flex;flex-wrap:wrap;gap:3px;margin-left:10px;margin-bottom:3px;}
.task-info{flex:1;}
.task-card-name{font-size:13px;font-weight:600;color:var(--text1);margin-bottom:2px;}
.task-card-name.done{text-decoration:line-through;opacity:.45;}
.task-card-desc{font-size:12px;color:var(--text3);margin-bottom:4px;}
.task-card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.task-meta-pill{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500;}
.pill-date{background:#FFF7ED;color:#EA580C;}
.pill-lead{background:var(--blue-light);color:var(--blue);}
.pill-done{background:#ECFDF5;color:#059669;}
.pill-prog{background:#FFFBEB;color:#D97706;}
.task-actions{display:flex;gap:4px;flex-shrink:0;}
.task-act-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px;color:var(--text3);font-family:'DM Sans',sans-serif;}
.task-act-btn:hover{background:var(--bg2);}
.empty-tasks{text-align:center;padding:3rem;color:var(--text4);font-size:13px;}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(17,24,39,.45);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding:1.5rem 1rem;overflow-y:auto;}
.modal{background:var(--surface);border-radius:12px;width:100%;border:1px solid var(--border);box-shadow:0 20px 40px rgba(0,0,0,.12);}
.modal-lg{max-width:860px;}
.modal-md{max-width:500px;}
.modal-sm{max-width:400px;}
.modal-hdr{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border2);display:flex;align-items:flex-start;gap:14px;}
.modal-av{width:46px;height:46px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;}
.modal-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;background:var(--blue-light);color:var(--blue);}
.modal-title{font-size:18px;font-weight:600;color:var(--text1);}
.modal-sub{font-size:12px;color:var(--text4);margin-top:2px;}
.modal-close{margin-left:auto;background:transparent;border:1px solid var(--border);cursor:pointer;color:var(--text4);padding:5px 6px;border-radius:6px;line-height:1;font-size:16px;}
.modal-close:hover{background:var(--bg2);color:var(--text2);}
.modal-acts{padding:.7rem 1.4rem;border-bottom:1px solid var(--border2);display:flex;gap:8px;align-items:center;background:var(--bg2);flex-wrap:wrap;}
.modal-body{display:grid;grid-template-columns:1fr 1fr;}
.modal-left{padding:1.1rem 1.4rem;border-right:1px solid #F3F4F6;overflow-y:auto;max-height:64vh;}
.modal-right{padding:1.1rem 1.4rem;overflow-y:auto;max-height:64vh;}
.modal-foot{padding:.875rem 1.4rem;border-top:1px solid var(--border2);background:var(--bg2);border-radius:0 0 12px 12px;}
.modal-body-pad{padding:1.1rem 1.4rem;}
.sec-lbl{font-size:11px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.7rem;display:flex;align-items:center;gap:5px;}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.1rem;}
.df{border:1px solid var(--border);border-radius:8px;padding:9px 11px;background:var(--surface);}
.df.full{grid-column:1/-1;}
.df-lbl{font-size:10px;font-weight:600;color:var(--text4);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.df-inp{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text1);outline:none;font-family:'DM Sans',sans-serif;}
.df-sel{width:100%;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text1);outline:none;font-family:'DM Sans',sans-serif;cursor:pointer;}
.df-ta{width:100%;border:none;background:transparent;font-size:13px;color:var(--text1);outline:none;font-family:'DM Sans',sans-serif;resize:vertical;min-height:90px;line-height:1.6;}
.ro-banner{background:#FFFBEB;color:#D97706;font-size:12px;padding:8px 1.4rem;border-bottom:1px solid #FDE68A;display:flex;align-items:center;gap:7px;font-weight:500;}
.tpbar{height:5px;background:var(--bg);border-radius:999px;overflow:hidden;margin-bottom:3px;}
.tpfill{height:100%;border-radius:999px;}
.t-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.t-item{display:flex;align-items:flex-start;gap:8px;padding:7px 9px;border:1px solid var(--border2);border-radius:8px;background:var(--bg2);}
.t-chk{width:16px;height:16px;border-radius:4px;border:1.5px solid #D1D5DB;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;}
.t-chk.done{background:var(--blue);border-color:var(--blue);color:#fff;}
.t-info{flex:1;}
.t-nm{font-size:12px;color:var(--text2);font-weight:500;}
.t-due{font-size:11px;color:#EA580C;margin-top:2px;}
.t-del{border:none;background:transparent;cursor:pointer;color:#D1D5DB;padding:2px;}
.t-del:hover{color:#DC2626;}
.add-task-row{display:flex;gap:6px;margin-bottom:6px;}
.at-inp{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text1);outline:none;}
.at-inp:focus{border-color:var(--blue);}
.at-btn{padding:7px 12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.at-date{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text1);outline:none;}
.at-date:focus{border-color:var(--blue);}
.fu-row{display:flex;gap:7px;margin-bottom:.6rem;}
.fu-inp{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text1);outline:none;}
.fu-inp:focus{border-color:var(--blue);}
.fu-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:9px 14px;cursor:pointer;font-size:15px;}
.fu-btn:hover{background:#1D4ED8;}
.act-list{display:flex;flex-direction:column;}
.act-item{display:flex;gap:10px;padding:9px 0;position:relative;}
.act-item:not(:last-child)::after{content:'';position:absolute;left:13px;top:33px;bottom:-4px;width:1px;background:var(--bg);}
.act-ico{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.ai-move{background:#ECFDF5;color:#059669;}
.ai-msg{background:var(--blue-light);color:var(--blue);}
.ai-info{background:var(--bg);color:var(--text3);}
.ai-mention{background:#F5F3FF;color:#7C3AED;}
.ai-link{background:#FFF7ED;color:#EA580C;}
.act-when{font-size:10px;color:var(--text4);margin-bottom:1px;}
.act-txt{font-size:12px;color:var(--text2);font-weight:500;}
.act-by{font-size:10px;color:var(--text4);}
.save-btn{width:100%;background:var(--blue);color:#fff;border:none;padding:10px;border-radius:8px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
.save-btn:hover{background:#1D4ED8;}
.del-btn{padding:6px 12px;border:1px solid #FCA5A5;border-radius:8px;background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:#DC2626;display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;}
.del-btn:hover{background:#FEF2F2;}
.stage-sel{border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text2);background:var(--surface);outline:none;cursor:pointer;}
.stage-sel:focus{border-color:var(--blue);}
.mention-check{display:flex;align-items:center;gap:6px;font-size:12px;color:#7C3AED;font-weight:500;cursor:pointer;background:#F5F3FF;padding:5px 12px;border-radius:8px;border:1px solid #DDD6FE;}
.cpicker{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.copt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.copt.sel{border-color:var(--text1);transform:scale(1.15);}
.loading-ov{position:fixed;inset:0;background:rgba(249,250,251,.92);display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:12px;}
.spin{width:24px;height:24px;border:2px solid #E5E7EB;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{font-size:13px;color:var(--text4);}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#111827;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:600;box-shadow:0 8px 24px rgba(0,0,0,.15);opacity:0;transition:opacity .2s;pointer-events:none;}
.toast.show{opacity:1;}
/* WhatsApp-style notification toasts */
.notif-toast-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:700;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.notif-toast{background:var(--surface);border-radius:12px;padding:12px 16px 12px 14px;min-width:290px;max-width:350px;box-shadow:0 8px 32px rgba(0,0,0,.18);border-left:4px solid #2563EB;pointer-events:all;transform:translateX(calc(100% + 2rem));transition:transform .38s cubic-bezier(.34,1.56,.64,1),opacity .38s ease;opacity:0;display:flex;align-items:flex-start;gap:10px;}
.notif-toast.show{transform:translateX(0);opacity:1;}
.notif-toast.hide{transform:translateX(calc(100% + 2rem));opacity:0;transition:transform .3s ease,opacity .3s ease;}
.notif-toast-icon{font-size:20px;line-height:1;flex-shrink:0;margin-top:1px;}
.notif-toast-body{flex:1;min-width:0;}
.notif-toast-title{font-size:13px;font-weight:700;color:var(--text1);margin-bottom:2px;line-height:1.3;}
.notif-toast-sub{font-size:11.5px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.notif-toast-close{flex-shrink:0;font-size:14px;color:var(--text4);cursor:pointer;line-height:1;padding:2px 0 0 4px;align-self:flex-start;}
.notif-toast-close:hover{color:var(--text2);}
/* Tipos */
.notif-toast.tipo-ganho{border-left-color:#059669;background:#f0fdf4;}
.notif-toast.tipo-perdido{border-left-color:#DC2626;background:#fef2f2;}
.notif-toast.tipo-tarefa{border-left-color:#F59E0B;background:#fffbeb;}
.notif-toast.tipo-formulario{border-left-color:#7C3AED;background:#faf5ff;}
.notif-toast.tipo-renovacao{border-left-color:#059669;background:#f0fdf4;}
.notif-toast.tipo-padrao{border-left-color:var(--blue);background:var(--blue-light);}
/* Sininho com contador */
.nbell{position:relative;}
.ndot{position:absolute;top:-5px;right:-6px;min-width:16px;height:16px;padding:0 4px;background:#DC2626;border-radius:999px;border:2px solid #fff;display:none;font-size:9px;font-weight:700;color:#fff;line-height:12px;text-align:center;font-family:'DM Sans',sans-serif;}
.npanel{position:absolute;top:calc(100% + 8px);right:0;width:300px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.1);z-index:300;display:none;}
.np-hdr{padding:.75rem 1rem;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
.np-title{font-size:13px;font-weight:600;}
.np-clear{font-size:11px;color:var(--blue);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;}
.nlist{max-height:280px;overflow-y:auto;}
.nitem{padding:.75rem 1rem;border-bottom:1px solid var(--border2);cursor:pointer;}
.nitem:hover{background:var(--bg2);}
.nitem.unread{background:var(--blue-light);}
.ntxt{font-size:12px;color:var(--text2);margin-bottom:2px;}
.nwhen{font-size:11px;color:var(--text4);}
.nempty{padding:1.5rem;text-align:center;font-size:12px;color:var(--text4);}
.rtabs{display:flex;gap:4px;margin-bottom:1rem;}
.rtab{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text3);font-family:'DM Sans',sans-serif;}
.rtab.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.rtable{width:100%;border-collapse:collapse;font-size:13px;}
.rtable th{background:var(--bg2);padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;}
.rtable td{padding:8px 12px;border-bottom:1px solid var(--border2);color:var(--text2);white-space:nowrap;}
.rtable tr:hover td{background:var(--bg2);}
.rtotal td{background:var(--bg);font-weight:600;color:var(--text1);}
</style>
</head>

function el(tag,cls,txt){ const e=document.createElement(tag); if(cls) e.className=cls; if(txt!==undefined){ if(typeof txt==='string'&&txt.includes('<')) e.innerHTML=txt; else e.textContent=txt; } return e; }

// ── API ──
async function apiLoad(){
  try{
    const r=await fetch(`${JSONBIN_URL}/${BIN_ID}/latest`,{headers:{'X-Master-Key':JSONBIN_KEY}});
    const d=await r.json();
    if(d.record?.opData) window._opData=d.record.opData;
    return{ leads:d.record?.leads||[], columns:d.record?.columns||DEF_COLS, notifications:d.record?.notifications||[], closings:d.record?.closings||[], globalTasks:d.record?.globalTasks||[], customProds:d.record?.customProds||[], customTags:d.record?.customTags||[] };
  }catch(e){ showToast('Erro ao carregar.'); return{leads:[],columns:DEF_COLS,notifications:[],closings:[],globalTasks:[]}; }
}
async function apiSave(){
  try{
    const opData=window._opData||null;
    await fetch(`${JSONBIN_URL}/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},body:JSON.stringify({leads:allLeads,columns,notifications,closings,globalTasks,customProds,customTags,opData})});
  }catch(e){ showToast('Erro ao salvar.'); }
}

// ── AUTH ──

document.getElementById('l-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
function doLogin(){
  const u=document.getElementById('l-user').value.trim().toLowerCase();
  const p=document.getElementById('l-pass').value;
  const user=USERS[u];
  if(!user||user.pass!==p){ document.getElementById('login-err').textContent='Usuário ou senha incorretos.'; return; }
  currentUser=u; currentRole=user.role; viewFilter=currentRole==='admin'?'all':'mine';
  document.getElementById('login-err').textContent='';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  const av=document.getElementById('hdr-av'); av.textContent=user.init; av.style.background=user.bg; av.style.color=user.color;
  document.getElementById('hdr-name').textContent=user.name;
  if(currentRole==='admin'){ document.getElementById('hdr-admin').style.display='inline-block'; document.getElementById('view-tabs').style.display='flex'; document.getElementById('sb-config').style.display='flex'; document.getElementById('sb-ferramentas').style.display='flex'; document.getElementById('sb-operacional').style.display='flex'; document.getElementById('view-select').value=viewFilter; }
  if(autoRefreshTimer) clearInterval(autoRefreshTimer);
  loadAndRender().then(()=>{
    // Verifica tarefas vencendo hoje ao logar
    setTimeout(()=>verificarTarefasVencendo(allLeads), 2000);
    autoRefreshTimer=setInterval(async()=>{
      const d=await apiLoad();
      // Só re-renderiza se os dados mudaram
      const newHash=JSON.stringify({leads:d.leads,columns:d.columns,notifications:d.notifications,closings:d.closings,globalTasks:d.globalTasks||[],customProds:d.customProds||[],customTags:d.customTags||[]});
      const oldHash=JSON.stringify({leads:allLeads,columns,notifications,closings,globalTasks,customProds,customTags});
      if(newHash===oldHash) return;
      const leadsAntigosSnap=allLeads.map(l=>({...l,tasks:(l.tasks||[]).map(t=>({...t}))}));
      const closingsAntigosSnap=[...closings];
      allLeads=d.leads; columns=d.columns; notifications=d.notifications; closings=d.closings; globalTasks=d.globalTasks||[]; customProds=d.customProds||[]; customTags=d.customTags||[];
      detectarMudancas(leadsAntigosSnap, allLeads, [], [], closingsAntigosSnap, closings);
      renderAll(); renderNotifDot(); updateTasksBadge();
    },3000);
  });
}
document.getElementById('logout-btn').addEventListener('click',()=>{

// ── VIEW FILTER ──
document.getElementById('view-tabs').addEventListener('change', e=>{
  if(e.target.id!=='view-select') return;

function visibleLeads(){
  let leads=[];
  if(currentRole==='admin'){
    if(viewFilter==='mine') leads=allLeads.filter(l=>l.owner==='admin');
    else if(viewFilter==='nalberty') leads=allLeads.filter(l=>l.owner==='nalberty');
    else leads=allLeads;
  } else {
    leads=allLeads.filter(l=>l.owner===currentUser);
  }
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    leads=leads.filter(l=>(l.name||'').toLowerCase().includes(q)||(l.dealName||'').toLowerCase().includes(q)||(l.product||'').toLowerCase().includes(q)||(l.phone||'').toLowerCase().includes(q));
  }
  return leads;
}

// ── LOAD ──
document.getElementById('refresh-btn').addEventListener('click', loadAndRender);

// ── SEARCH ──
document.getElementById('search-btn').addEventListener('click',()=>{

async function loadAndRender(){
  showLoading('Carregando...');
  const d=await apiLoad(); allLeads=d.leads; columns=d.columns; notifications=d.notifications; closings=d.closings; globalTasks=d.globalTasks||[]; customProds=d.customProds||[]; customTags=d.customTags||[];
  hideLoading(); renderAll(); renderNotifDot(); updateTasksBadge();
}

// ── RENDER ──
function renderAll(){ renderMetrics(); renderBoard(); if(currentPage==='tasks') renderTasksPage(); }

function getProds(){ return [...DEF_PRODS, ...customProds]; }

let metricsVisible=true;
function toggleMetrics(){
  metricsVisible=!metricsVisible;
  const bar=document.getElementById('metrics-bar');
  const icon=document.getElementById('metrics-eye-icon');
  const lbl=document.getElementById('metrics-toggle-label');
  bar.classList.toggle('collapsed',!metricsVisible);
  icon.className=metricsVisible?'ti ti-eye':'ti ti-eye-off';
  lbl.textContent=metricsVisible?'Ocultar métricas':'Mostrar métricas';
}

function renderMetrics(){
  const leads=visibleLeads();
  const total=leads.length, totalVal=leads.reduce((s,l)=>s+(Number(l.value)||0),0), totalComm=leads.reduce((s,l)=>s+calcComm(l.value,l.commPct),0);
  const totalRepVend=leads.reduce((s,l)=>s+calcComm(calcComm(l.value,l.commPct),l.repVendPct||0),0);
  const ativos=leads.filter(l=>!columns.find(c=>c.id===l.col)?.terminal).length;
  const ganhos=leads.filter(l=>columns.find(c=>c.id===l.col)?.terminal==='won').length;
  const conv=total>0?Math.round((ganhos/total)*100):0;
  const commLabel=currentRole==='admin'?'Comissão':'Meu Repasse';
  const commVal=currentRole==='admin'?totalComm:totalRepVend;
  const commSub=currentRole==='admin'?'% negociada':'estimativa de ganhos';
  document.getElementById('metrics-bar').innerHTML=`
    <div class="mc"><div class="mlbl">Leads</div><div class="mval">${total}</div><div class="msub">${fmt(totalVal)}</div></div>
    <div class="mc"><div class="mlbl">Valor Total</div><div class="mval">${fmt(totalVal)}</div><div class="msub">em pipeline</div></div>
    <div class="mc"><div class="mlbl">${commLabel}</div><div class="mval" style="color:#059669">${fmt(commVal)}</div><div class="msub">${commSub}</div></div>
    <div class="mc"><div class="mlbl">Ativos</div><div class="mval">${ativos}</div><div class="msub">${total>0?Math.round((ativos/total)*100):0}% do pipeline</div></div>
    <div class="mc"><div class="mlbl">Conversão</div><div class="mval">${conv}%</div><div class="msub">${ganhos} de ${total} convertidos</div></div>`;
}

function renderBoard(){
  const leads=visibleLeads(); const board=document.getElementById('board'); board.innerHTML='';
  columns.forEach(col=>{
    const cl=leads.filter(l=>l.col===col.id);
    const colVal=cl.reduce((s,l)=>s+(Number(l.value)||0),0), colComm=cl.reduce((s,l)=>s+calcComm(l.value,l.commPct),0);
    const colEl=el('div','col'); colEl.dataset.colId=col.id;
    const acc=el('div','cacc'); acc.style.background=col.color; colEl.appendChild(acc);
    const hdr=el('div','chdr'); const tr=el('div','ctr');
    const icon=col.terminal==='won'?'<i class="ti ti-trophy" style="color:#059669;font-size:12px;"></i> ':col.terminal==='lost'?'<i class="ti ti-x" style="color:#DC2626;font-size:12px;"></i> ':'';
    const nm=el('span','cnm',icon+col.name); const acts=el('div','cact'); const cnt=el('span','cct',String(cl.length)); acts.appendChild(cnt);
    if(!col.fixed){
      const eb=el('button','cedit-btn'); eb.innerHTML='<i class="ti ti-pencil"></i>'; eb.addEventListener('click',()=>openEditCol(col.id));
      const db=el('button','cedit-btn'); db.innerHTML='<i class="ti ti-trash"></i>'; db.addEventListener('click',()=>deleteCol(col.id));
      acts.appendChild(eb); acts.appendChild(db);
    }
    tr.appendChild(nm); tr.appendChild(acts); hdr.appendChild(tr);
    hdr.appendChild(el('div','cst',`${fmt(colVal)} · Comissão: ${fmt(colComm)}`)); colEl.appendChild(hdr);
    const area=el('div','carea');
    if(cl.length===0){ const ec=el('div','ecol'); ec.innerHTML='<i class="ti ti-inbox" style="font-size:20px;opacity:.3;"></i><span>Sem leads aqui</span>'; area.appendChild(ec); }
    else cl.forEach(l=>area.appendChild(buildCard(l,col.color)));
    area.addEventListener('dragover',e=>{e.preventDefault();colEl.classList.add('drag-over');});
    area.addEventListener('dragleave',()=>colEl.classList.remove('drag-over'));
    area.addEventListener('drop',async e=>{e.preventDefault();colEl.classList.remove('drag-over');if(dragLeadId) await dropLead(dragLeadId,col.id);});
    colEl.appendChild(area);
    const addBtn=el('button','caddbtn'); addBtn.innerHTML='<i class="ti ti-plus"></i> Novo Item'; addBtn.addEventListener('click',()=>openNewLeadInCol(col.id)); colEl.appendChild(addBtn);
    board.appendChild(colEl);
  });
  const addColWrap=el('div','addcol-wrap'); const addColBtn=el('button','addcol-btn'); addColBtn.innerHTML='<i class="ti ti-plus"></i><span style="font-size:10px">Nova coluna</span>'; addColBtn.addEventListener('click',openAddCol); addColWrap.appendChild(addColBtn); board.appendChild(addColWrap);
}

function buildCard(l, accentColor){
  const tasks=l.tasks||[];
  const done=tasks.filter(t=>t.done).length, tot=tasks.length, pct=tot>0?Math.round((done/tot)*100):0;
  const fc=pct>=75?'#22C55E':pct>=40?'#2563EB':'#F59E0B';
  const ow=USERS[l.owner]||USERS.admin;
  const pctD=Number(l.commPct||0).toFixed(1).replace('.0','');
  const upcoming=tasks.filter(t=>!t.done&&t.due).sort((a,b)=>a.due.localeCompare(b.due))[0];
  const card=el('div','card'); card.draggable=true; card.dataset.id=l.id;
  card.addEventListener('dragstart',()=>{dragLeadId=l.id;card.classList.add('dragging');});
  card.addEventListener('dragend',()=>{dragLeadId=null;card.classList.remove('dragging');});
  card.addEventListener('click',()=>openLead(l.id));
  const acc2=el('div','card-accent'); acc2.style.background=accentColor; card.appendChild(acc2);
  card.appendChild(el('div','card-name',l.name));
  if(l.dealName){ card.appendChild(el('div','card-deal',l.dealName)); }
  card.appendChild(el('div','card-prod',(l.insuranceType?`${l.product||'—'} · ${l.insuranceType}`:l.product||'—')));
  if(upcoming){ const dt=el('div','task-due-tag'); dt.innerHTML=`<i class="ti ti-clock" style="font-size:10px;"></i> ${fmtDue(upcoming.due)}`; card.appendChild(dt); }
  // Tags — colored strip on left border
  if(l.tags&&l.tags.length){
    const firstTag=l.tags[0];
    const ct=customTags.find(x=>x.id===firstTag.id)||firstTag;
    const tc=getTagColor(ct.color||firstTag.color);
    card.style.borderLeft=`4px solid ${tc.dot}`;
    // Show all tags as small dots below
    const tw=el('div','tags-wrap');
    l.tags.forEach(tag=>{
      const ctt=customTags.find(x=>x.id===tag.id)||tag;
      const tcc=getTagColor(ctt.color||tag.color);
      const tp=el('div','tag-pill'); tp.style.cssText=`background:${tcc.bg};color:${tcc.color};display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:999px;font-size:9px;font-weight:600;`;
      const dot=el('span'); dot.style.cssText=`width:5px;height:5px;border-radius:50%;background:${tcc.dot};flex-shrink:0;`;
      tp.appendChild(dot); tp.appendChild(document.createTextNode(ctt.name||tag.name));
      tw.appendChild(tp);
    });
    card.appendChild(tw);
  }
  // Value / repasse on card
  const repVend=calcComm(calcComm(l.value,l.commPct),l.repVendPct||0);
  card.appendChild(el('div','card-val',fmt(l.value)));
  if(currentRole==='admin'){
    // Admin: mostra comissão normal + repasse se houver
    const comm=el('div','card-comm'); comm.appendChild(document.createTextNode(fmt(calcComm(l.value,l.commPct))+' ')); comm.appendChild(el('span','cpill',pctD+'%')); card.appendChild(comm);
    if((l.repVendPct||0)>0){
      const repEl=el('div'); repEl.style.cssText='font-size:11px;color:#7C3AED;font-weight:600;margin-left:10px;margin-bottom:4px;';
      repEl.textContent=`Rep. ${fmt(repVend)} (${l.repVendPct}%)`;
      card.appendChild(repEl);
    }
  } else {
    // Nalberty: mostra só repasse dele em roxo
    const repEl=el('div'); repEl.style.cssText='font-size:12px;color:#7C3AED;font-weight:600;margin-left:10px;margin-bottom:4px;';
    repEl.textContent=repVend>0?`Repasse: ${fmt(repVend)} (${l.repVendPct}%)`:'Sem repasse definido';
    card.appendChild(repEl);
  }
  const foot=el('div','card-foot');
  const pw=el('div','pbar-wrap'); const pb=el('div','pbar'); const pf=el('div','pfill'); pf.style.width=pct+'%'; pf.style.background=fc; pb.appendChild(pf); pw.appendChild(pb); pw.appendChild(el('div','ptxt',`${done}/${tot} tarefas`)); foot.appendChild(pw);
  foot.appendChild(el('div','card-pct',pct+'%'));
  const oav=el('div','oav',ow.init); oav.style.background=ow.bg; oav.style.color=ow.color; oav.title=ow.name; foot.appendChild(oav);
  card.appendChild(foot);
  return card;
}

function fmtDue(due){
  if(!due) return '';
  const [datePart, timePart]=due.split('T');
  if(!datePart) return due;
  const [y,m,d]=datePart.split('-');
  return timePart ? `${d}/${m} ${timePart.slice(0,5)}` : `${d}/${m}/${y}`;
}

// ── DRAG DROP ──
async function dropLead(leadId, newColId){
  const l=allLeads.find(x=>x.id===leadId); if(!l||l.col===newColId) return;
  if(!canEdit(l)){showToast('Sem permissão.');return;}
  const col=columns.find(c=>c.id===newColId);
  l.col=newColId; l.activities=l.activities||[];
  l.activities.push({type:'move',text:`Movido para "${col?.name||newColId}"`,by:currentUser,when:`${dateStr()} · ${nowStr()}`});
  if(col?.terminal){

function updateTasksBadge(){

  const pending=myTasks.filter(t=>t.status!=='done').length;
  const badge=document.getElementById('tasks-badge');
  badge.style.display=pending>0?'inline-block':'none';

function allTasksForUser(){
  const leadTasks=[];
  allLeads.forEach(l=>{
    if(currentRole!=='admin'&&l.owner!==currentUser) return;
    (l.tasks||[]).forEach((t,i)=>{ leadTasks.push({...t, _leadId:l.id, _taskIdx:i, _leadName:l.name, _source:'lead'}); });
  });
  const gTasks=(globalTasks||[]).filter(t=>currentRole==='admin'||t.owner===currentUser).map(t=>({...t,_source:'global'}));
  return [...leadTasks,...gTasks];
}

document.querySelector('.task-tabs').addEventListener('click', e=>{

function renderTasksPage(){
  const wrap=document.getElementById('task-list-wrap'); wrap.innerHTML='';
  const all=allTasksForUser();
  const filtered=all.filter(t=>{
    if(currentTaskTab==='todo') return t.status==='todo'||t.status==='inprogress'||!t.status;
    return t.status==='done';
  }).sort((a,b)=>{
    if(a.due&&b.due) return a.due.localeCompare(b.due);
    if(a.due) return -1; if(b.due) return 1; return 0;
  });
  if(filtered.length===0){
    const em=el('div','empty-tasks'); em.innerHTML=`<i class="ti ti-checkbox" style="font-size:32px;opacity:.2;display:block;margin-bottom:8px;"></i>Nenhuma tarefa aqui.`; wrap.appendChild(em); return;
  }
  filtered.forEach(t=>{
    const card=el('div','task-card');
    // circle — toggle done
    const circle=el('div','task-circle'+(t.status==='done'?' done':''));
    if(t.status==='done') circle.innerHTML='<i class="ti ti-check" style="font-size:11px;"></i>';
    circle.addEventListener('click', async()=>{
      if(t.status!=='done'){
        // Ask for completion note
        openCompletionNote(t);
      } else {
        // Unmark done
        if(t._source==='global'){ const gt=globalTasks.find(x=>x.id===t.id); if(gt){gt.status='todo'; delete gt.completionNote;} }
        else { const lead=allLeads.find(l=>l.id===t._leadId); if(lead&&lead.tasks[t._taskIdx]){lead.tasks[t._taskIdx].status='todo'; delete lead.tasks[t._taskIdx].completionNote;} }
        showLoading(); await apiSave(); hideLoading(); renderTasksPage(); updateTasksBadge(); renderBoard();
      }
    });
    card.appendChild(circle);
    // info
    const info=el('div','task-info');
    const nm=el('div','task-card-name'+(t.status==='done'?' done':''),t.name); info.appendChild(nm);
    if(t.completionNote) info.appendChild(el('div','task-card-desc',`<i class="ti ti-circle-check" style="color:#059669;font-size:12px;"></i> ${t.completionNote}`));
    else if(t.desc) info.appendChild(el('div','task-card-desc',t.desc));
    const meta=el('div','task-card-meta');
    if(t.due){ const dp=el('span','task-meta-pill pill-date'); dp.innerHTML=`<i class="ti ti-clock" style="font-size:10px;"></i> ${fmtDue(t.due)}`; meta.appendChild(dp); }
    if(t._leadName){ const lp=el('span','task-meta-pill pill-lead'); lp.innerHTML=`<i class="ti ti-user" style="font-size:10px;"></i> ${t._leadName}`; meta.appendChild(lp); }
    if(t.status==='done') meta.appendChild(el('span','task-meta-pill pill-done','Concluída'));
    info.appendChild(meta); card.appendChild(info);
    // actions
    const taskActs=el('div','task-actions');
    if(t._source==='global'){
      // Edit button
      const eb=el('button','task-act-btn'); eb.innerHTML='<i class="ti ti-pencil"></i>';
      eb.addEventListener('click',()=>openGlobalTaskModal(t.id));
      taskActs.appendChild(eb);
      // Delete button
      const db=el('button','task-act-btn'); db.innerHTML='<i class="ti ti-trash"></i>';
      db.addEventListener('click',async()=>{ globalTasks=globalTasks.filter(x=>x.id!==t.id); showLoading();await apiSave();hideLoading();renderTasksPage();updateTasksBadge(); });
      taskActs.appendChild(db);
    }
    card.appendChild(taskActs);
    wrap.appendChild(card);
  });
}

function openCompletionNote(t){
  const modal=document.getElementById('gtask-modal'); modal.innerHTML='';

      }
      showLoading();await apiSave();hideLoading();closeLead();renderAll();showToast('Lead salvo!');
    });
    foot.appendChild(saveBtn); modal.appendChild(foot);
  }
}

/**
 * showWapToast(titulo, texto, tipo, leadId?)
 * tipos: 'ganho' | 'perdido' | 'tarefa' | 'formulario' | 'renovacao' | 'padrao'
 */
function showWapToast(titulo, texto, tipo, leadId){
  const TIPO_ICON = {
    ganho:      '<i class="ti ti-trophy" style="color:#059669"></i>',
    perdido:    '<i class="ti ti-x" style="color:#DC2626"></i>',
    tarefa:     '<i class="ti ti-clock" style="color:#F59E0B"></i>',
    formulario: '<i class="ti ti-forms" style="color:#7C3AED"></i>',
    renovacao:  '<i class="ti ti-refresh" style="color:#059669"></i>',
    padrao:     '<i class="ti ti-bell" style="color:#3B82F6"></i>',
  };
  const t = tipo || 'padrao';
  const icon = TIPO_ICON[t] || '<i class="ti ti-bell"></i>';

  const wrap = document.getElementById('notif-toast-wrap');
  const toast = document.createElement('div');
  toast.className = `notif-toast tipo-${t}`;

  toast.innerHTML =
    `<div class="notif-toast-icon">${icon}</div>` +
    `<div class="notif-toast-body">` +
      `<div class="notif-toast-title">${titulo}</div>` +
      (texto ? `<div class="notif-toast-sub">${texto}</div>` : '') +
    `</div>` +
    `<div class="notif-toast-close" title="Fechar"><i class="ti ti-x" style="font-size:12px;"></i></div>`;

  wrap.appendChild(toast);

  // Slide in
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ toast.classList.add('show'); }); });

  const dismiss = ()=>{ toast.classList.add('hide'); setTimeout(()=>toast.remove(), 350); };

  // Auto-dismiss em 4s
  const timer = setTimeout(dismiss, 4000);

  // Clique no X fecha imediatamente
  toast.querySelector('.notif-toast-close').addEventListener('click', e=>{
    e.stopPropagation();
    clearTimeout(timer);
    dismiss();
  });

  // Clique no corpo abre o lead (se tiver)
  toast.addEventListener('click', ()=>{
    clearTimeout(timer);
    dismiss();
    if(leadId) openLead(leadId);
  });
}

function verificarNovosCards(novosLeads, leadsAntigos){
  if(!currentUser || !leadsAntigos) return;
  const idsAntigos = new Set(leadsAntigos.map(l=>l.id));
  const novos = novosLeads.filter(l=>!idsAntigos.has(l.id));
  if(novos.length === 0) return;

  const viaFormulario  = novos.filter(l=>l.formRespostas && l.formRespostas.length > 0);
  const viaImportacao  = novos.filter(l=>l.activities && l.activities[0]?.text?.includes('Relatório de Renovações'));
  const viaCriacao     = novos.filter(l=>!viaFormulario.includes(l) && !viaImportacao.includes(l));

  // Formulário — Admin sempre vê; Nalberty só se for dono
  viaFormulario.forEach(l=>{
    if(currentUser === 'admin'){
      addNotification({for:'admin', text:`Novo card via formulário: ${l.name}`, leadId:l.id});
      showWapToast('Novo card via formulário', l.name, 'formulario', l.id);
    }
    if(currentUser === 'nalberty' && l.owner === 'nalberty'){
      addNotification({for:'nalberty', text:`Novo card via formulário: ${l.name}`, leadId:l.id});
      showWapToast('Novo card via formulário', l.name, 'formulario', l.id);
    }
  });

  // Importação de renovações
  if(viaImportacao.length > 0){
    const meusImportados = viaImportacao.filter(l=>l.owner===currentUser);
    if(currentUser === 'admin'){
      addNotification({for:'admin', text:`${viaImportacao.length} cards de renovação importados`, leadId:null});
      showWapToast(`${viaImportacao.length} cards de renovação importados`, 'Relatório de Renovações', 'renovacao', null);
    } else if(currentUser === 'nalberty' && meusImportados.length > 0){
      addNotification({for:'nalberty', text:`${meusImportados.length} cards de renovação atribuídos a você`, leadId:null});
      showWapToast(`${meusImportados.length} cards de renovação`, 'Atribuídos a você', 'renovacao', null);
    }
  }

  // Criação manual
  viaCriacao.forEach(l=>{
    const criadoPor        = l.activities?.[0]?.by || '';
    const criadoPorNalberty = criadoPor === 'nalberty';
    const atribuidoANalberty = l.owner === 'nalberty';

    if(currentUser === 'admin' && criadoPorNalberty){
      addNotification({for:'admin', text:`Nalberty criou um novo card: ${l.name}`, leadId:l.id});
      showWapToast('Nalberty criou um novo card', l.name, 'padrao', l.id);
    }
    if(currentUser === 'nalberty' && !criadoPorNalberty && atribuidoANalberty){
      addNotification({for:'nalberty', text:`Novo card atribuído a você: ${l.name}`, leadId:l.id});
      showWapToast('Novo card atribuído a você', l.name, 'padrao', l.id);
    }
  });
}

function verificarNegociosGanhosOuPerdidos(novosLeads, leadsAntigos){
  if(!leadsAntigos) return;
  novosLeads.forEach(l=>{
    const antigo = leadsAntigos.find(a=>a.id===l.id);
    if(!antigo) return;

    // Ganho
    if(antigo.col !== 'ganho' && l.col === 'ganho'){
      if(currentUser === 'admin'){
        addNotification({for:'admin', text:`Negócio GANHO: ${l.name}`, leadId:l.id});
        showWapToast('Negócio Ganho!', l.name, 'ganho', l.id);
      }
      if(currentUser === 'nalberty' && l.owner === 'nalberty'){
        addNotification({for:'nalberty', text:`Negócio GANHO: ${l.name}`, leadId:l.id});
        showWapToast('Negócio Ganho!', l.name, 'ganho', l.id);
      }
    }

    // Perdido
    if(antigo.col !== 'perdido' && l.col === 'perdido'){
      if(currentUser === 'admin'){
        addNotification({for:'admin', text:`Negócio PERDIDO: ${l.name}`, leadId:l.id});
        showWapToast('Negócio Perdido', l.name, 'perdido', l.id);
      }
      if(currentUser === 'nalberty' && l.owner === 'nalberty'){
        addNotification({for:'nalberty', text:`Negócio PERDIDO: ${l.name}`, leadId:l.id});
        showWapToast('Negócio Perdido', l.name, 'perdido', l.id);
      }
    }
  });
}

function verificarTarefasVencendo(leads){
  if(!currentUser) return;
  const hoje = dateStr();
  leads.forEach(l=>{
    (l.tasks||[]).forEach(t=>{
      if(t.done) return;
      // Responsável = assignedTo (se existir) ou dono da lead
      const responsavel = t.assignedTo || l.owner;
      if(responsavel !== currentUser) return;
      if(t.due && t.due.startsWith(hoje)){
        showWapToast('Tarefa vencendo hoje!', `${l.name} — ${t.name||t.text||''}`, 'tarefa', l.id);
      }
    });
  });
}

function verificarNovasTarefas(novosLeads, leadsAntigos){
  if(!currentUser || !leadsAntigos) return;
  novosLeads.forEach(l=>{
    const antiga = leadsAntigos.find(a=>a.id===l.id);
    const tarefasAntigas = new Set((antiga?.tasks||[]).map((_,i)=>i)); // índice simples
    const idsAntigasTxt  = new Set((antiga?.tasks||[]).map(t=>t.name||t.text||''));
    (l.tasks||[]).forEach(t=>{
      const nome = t.name||t.text||'';
      if(idsAntigasTxt.has(nome)) return; // já existia
      // Nova tarefa detectada — notificar o dono da lead
      const responsavel = t.assignedTo || l.owner;
      if(responsavel === currentUser && currentUser !== (l.activities?.[0]?.by)){
        addNotification({for:currentUser, text:`Nova tarefa: ${nome} (${l.name})`, leadId:l.id});
        showWapToast('Nova tarefa', `${nome} · ${l.name}`, 'tarefa', l.id);
      }
    });
  });
}

  const selMonth=modal.querySelector('#rep-month-sel')?.value||curMonth;
  let data=closings;
  if(tab==='Por mês') data=closings.filter(c=>c.month===selMonth);

function exportFatPDF(){
  const body=document.getElementById('fat-body');

function buildPDF(title, subtitle, data){
  const won=data.filter(c=>c.result==='won'||!c.result);
  const lost=data.filter(c=>c.result==='lost');
  const totalPremio=won.reduce((s,c)=>s+(c.value||0),0);
  const totalComm=won.reduce((s,c)=>s+(c.commValue||0),0);
  const totalRepVend=won.reduce((s,c)=>s+(c.repVendValue||0),0);
  const totalRepProd=won.reduce((s,c)=>s+(c.repProdValue||0),0);
  const commLiq=totalComm-totalRepVend-totalRepProd;
  const wonRows=won.length===0
    ?'<tr><td colspan="8" style="text-align:center;color:var(--text4);padding:12px;">Nenhum negócio ganho.</td></tr>'
    :won.map(c=>{
      const liq=(c.commValue||0)-(c.repVendValue||0)-(c.repProdValue||0);
      const ow=USERS[c.owner];
      return '<tr>'
        +'<td>'+c.date+'</td>'
        +'<td><strong>'+c.name+'</strong></td>'
        +'<td>'+( c.product||'—')+'</td>'
        +'<td>'+fmt(c.value)+'</td>'
        +'<td style="color:#059669">'+fmt(c.commValue)+' ('+c.commPct+'%)</td>'
        +'<td style="color:#7C3AED">'+fmt(c.repVendValue||0)+'</td>'
        +'<td style="color:#D97706">'+fmt(c.repProdValue||0)+'</td>'
        +'<td style="color:#1E40AF;font-weight:600">'+fmt(liq)+'</td>'
        +'<td>'+(ow?'<span style="background:'+ow.bg+';color:'+ow.color+';border-radius:50%;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700">'+ow.init+'</span>':c.owner)+'</td>'
        +'</tr>';
    }).join('')
    +'<tr style="background:var(--bg);font-weight:600"><td colspan="3">Total</td>'
    +'<td>'+fmt(totalPremio)+'</td>'
    +'<td style="color:#059669">'+fmt(totalComm)+'</td>'
    +'<td style="color:#7C3AED">'+fmt(totalRepVend)+'</td>'
    +'<td style="color:#D97706">'+fmt(totalRepProd)+'</td>'
    +'<td style="color:#1E40AF">'+fmt(commLiq)+'</td><td></td></tr>';
  const lostRows=lost.length===0
    ?'<tr><td colspan="4" style="text-align:center;color:var(--text4);padding:12px;">Nenhum negócio perdido.</td></tr>'
    :lost.map(c=>'<tr><td>'+c.date+'</td><td><strong>'+c.name+'</strong></td><td>'+(c.product||'—')+'</td><td>'+fmt(c.value)+'</td></tr>').join('');
  const w=window.open('','_blank');
  const now=new Date();
  const dateNow=now.toLocaleDateString('pt-BR');
  const timeNow=now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  w.document.write('<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>'+title+'</title><style>'
    +'*{box-sizing:border-box;margin:0;padding:0;}'
    +'@page{size:A4 portrait;margin:14mm 10mm;}'
    +'body{font-family:Arial,sans-serif;font-size:9px;color:var(--text1);background:var(--surface);}'
    +'.hdr{border-bottom:2px solid #2563EB;padding-bottom:8px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:flex-start;}'
    +'.brand{font-size:8px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;}'
    +'h1{font-size:15px;font-weight:700;color:var(--text1);margin-bottom:2px;}'
    +'.sub{font-size:8px;color:var(--text4);}'
    +'.date{font-size:8px;color:var(--text4);text-align:right;}'
    +'.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}'
    +'.card{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:7px 9px;}'
    +'.card-lbl{font-size:7px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}'
    +'.card-val{font-size:12px;font-weight:700;}'
    +'.card-sub{font-size:7px;color:var(--text4);margin-top:1px;}'
    +'.section{font-size:8px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 5px;border-bottom:1px solid var(--border);padding-bottom:3px;}'
    +'table{width:100%;border-collapse:collapse;}'
    +'th{background:var(--bg2);padding:5px 7px;text-align:left;font-size:7px;font-weight:700;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border);}'
    +'td{padding:5px 7px;border-bottom:1px solid var(--border2);font-size:8.5px;}'
    +'.footer{margin-top:14px;font-size:7px;color:var(--text4);border-top:1px solid var(--border);padding-top:6px;display:flex;justify-content:space-between;}'
    +'</style></head><body>'
    +'<div class="hdr"><div><div class="brand">Valor CRM</div><h1>'+title+'</h1><div class="sub">'+(subtitle?'Período: '+subtitle:'')+'</div></div><div class="date">Gerado em '+dateNow+' às '+timeNow+'</div></div>'
    +'<div class="cards">'
    +'<div class="card"><div class="card-lbl">Negócios Ganhos</div><div class="card-val">'+won.length+'</div></div>'
    +'<div class="card"><div class="card-lbl">Prêmio Total</div><div class="card-val" style="color:var(--blue)">'+fmt(totalPremio)+'</div></div>'
    +'<div class="card"><div class="card-lbl">Comissão Total</div><div class="card-val" style="color:#059669">'+fmt(totalComm)+'</div></div>'
    +'<div class="card"><div class="card-lbl">Liq. Corretora</div><div class="card-val" style="color:#1E40AF">'+fmt(commLiq)+'</div></div>'
    +'</div>'
    +'<div class="cards">'

    +'<div class="card"><div class="card-lbl">Rep. Produtor</div><div class="card-val" style="color:#D97706">'+fmt(totalRepProd)+'</div></div>'
    +'<div class="card"><div class="card-lbl">Negócios Perdidos</div><div class="card-val" style="color:#DC2626">'+lost.length+'</div></div>'
    +'<div class="card"><div class="card-lbl">Vl. Perdido</div><div class="card-val">'+fmt(lost.reduce((s,c)=>s+(c.value||0),0))+'</div></div>'
    +'</div>'
    +'<div class="section">Negócios Ganhos</div>'
    +'<table><thead><tr><th>Data</th><th>Cliente</th><th>Produto</th><th>Prêmio</th><th>Comissão</th><th>Rep. Vendedor</th><th>Rep. Produtor</th><th>Liq. Corretora</th><th>Resp.</th></tr></thead><tbody>'+wonRows+'</tbody></table>'
    +'<div class="section">Negócios Perdidos</div>'
    +'<table><thead><tr><th>Data</th><th>Cliente</th><th>Produto</th><th>Valor</th></tr></thead><tbody>'+lostRows+'</tbody></table>'
    +'<div class="footer"><span>Valor CRM • Documento gerado automaticamente</span><span>'+dateNow+'</span></div>'
    +'<scr'+'ipt>window.onload=()=>{window.print();}<'+'/scr'+'ipt>'
    +'</body></html>');
  w.document.close();
}

function renderConfig(){
  const body=document.getElementById('config-body'); body.innerHTML='';

  const sections=[
    {id:'produtos',    icon:'ti-package',  title:'Produtos',             sub:'Gerencie produtos padrão e personalizados', fn:renderProdutos},
    {id:'tags',        icon:'ti-tag',       title:'Tags',                 sub:'Crie e organize tags de categorização',    fn:renderTags},
    {id:'checklists',  icon:'ti-checkbox',  title:'Checklists Prontos',   sub:'Templates de checklist para o Operacional', fn:renderChecklistTemplates},
  ];

  sections.forEach(sec=>{
    const acc=el('div','cfg-accordion');
    const hdr=el('div','cfg-acc-hdr'); hdr.dataset.sec=sec.id;
    const left=el('div','cfg-acc-left');
    const icon=el('i',`cfg-acc-icon ti ${sec.icon}`);
    const info=el('div');
    const title=el('div','cfg-acc-title',sec.title);
    const sub=el('div','cfg-acc-sub',sec.sub);
    info.appendChild(title); info.appendChild(sub);
    left.appendChild(icon); left.appendChild(info);
    const chev=el('i','cfg-acc-chev ti ti-chevron-down');
    hdr.appendChild(left); hdr.appendChild(chev);

    const bd=el('div','cfg-acc-body');
    acc.appendChild(hdr); acc.appendChild(bd);
    body.appendChild(acc);

    hdr.addEventListener('click',()=>{
      const isOpen=hdr.classList.contains('open');
      // Fecha todos
      document.querySelectorAll('.cfg-acc-hdr').forEach(h=>h.classList.remove('open'));
      document.querySelectorAll('.cfg-acc-body').forEach(b=>b.classList.remove('open'));
      if(!isOpen){
        hdr.classList.add('open');
        bd.classList.add('open');
        bd.innerHTML='';
        sec.fn(bd);
      }
    });
  });
}

function renderChecklistTemplates(body){
  const op=getOpData();
  op.checklistTemplates=op.checklistTemplates||[];

  function renderTpls(){
    body.innerHTML='';
    if(op.checklistTemplates.length===0){
      body.appendChild(el('div','','Nenhum template criado ainda.'));
    }
    op.checklistTemplates.forEach((tpl,ti)=>{
      const card=document.createElement('div');
      card.style.cssText='border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:var(--surface);';
      const hdrRow=document.createElement('div'); hdrRow.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;';
      const nm=el('div','',tpl.name); nm.style.cssText='font-size:13px;font-weight:600;color:var(--text1);flex:1;';
      const delTpl=document.createElement('button');
      delTpl.style.cssText='border:none;background:transparent;color:var(--text4);cursor:pointer;font-size:13px;';
      delTpl.innerHTML='<i class="ti ti-trash"></i>';
      delTpl.addEventListener('click',()=>{ op.checklistTemplates.splice(ti,1); saveOpData(); renderTpls(); });
      hdrRow.appendChild(nm); hdrRow.appendChild(delTpl); card.appendChild(hdrRow);

      tpl.items.forEach((item,ii)=>{
        const row=document.createElement('div'); row.style.cssText='display:flex;align-items:center;gap:7px;padding:3px 0;font-size:12px;color:var(--text2);';
        row.innerHTML=`<i class="ti ti-circle" style="font-size:11px;color:var(--text4);"></i>${item}`;
        const delItem=document.createElement('button');
        delItem.style.cssText='border:none;background:transparent;color:var(--text4);cursor:pointer;font-size:11px;margin-left:auto;';
        delItem.innerHTML='<i class="ti ti-x"></i>';
        delItem.addEventListener('click',()=>{ tpl.items.splice(ii,1); saveOpData(); renderTpls(); });
        row.appendChild(delItem); card.appendChild(row);
      });

      // Add item to template
      const addRow=document.createElement('div'); addRow.style.cssText='display:flex;gap:6px;margin-top:8px;';
      const addInp=document.createElement('input'); addInp.placeholder='Novo item...';
      addInp.style.cssText='flex:1;border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:12px;font-family:\'DM Sans\',sans-serif;color:var(--text1);background:var(--input-bg);outline:none;';
      const addBtn=document.createElement('button');
      addBtn.style.cssText='background:var(--blue);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:\'DM Sans\',sans-serif;';
      addBtn.textContent='+ Item';
      addBtn.addEventListener('click',()=>{ const v=addInp.value.trim(); if(!v) return; tpl.items.push(v); addInp.value=''; saveOpData(); renderTpls(); });
      addInp.addEventListener('keydown',e=>{ if(e.key==='Enter') addBtn.click(); });
      addRow.appendChild(addInp); addRow.appendChild(addBtn); card.appendChild(addRow);
      body.appendChild(card);
    });

    // Criar novo template
    const newWrap=document.createElement('div'); newWrap.style.cssText='border:1.5px dashed var(--border);border-radius:10px;padding:12px 14px;margin-top:4px;';
    newWrap.appendChild(el('div','op-side-label','Novo template'));
    const nmRow=document.createElement('div'); nmRow.style.cssText='display:flex;gap:6px;';
    const nmInp=document.createElement('input'); nmInp.placeholder='Nome do template...';
    nmInp.style.cssText='flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:\'DM Sans\',sans-serif;color:var(--text1);background:var(--input-bg);outline:none;';
    const nmBtn=document.createElement('button');
    nmBtn.style.cssText='background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;';
    nmBtn.textContent='Criar';
    nmBtn.addEventListener('click',()=>{ const n=nmInp.value.trim(); if(!n) return; op.checklistTemplates.push({id:'tpl-'+Date.now(),name:n,items:[]}); nmInp.value=''; saveOpData(); renderTpls(); });
    nmInp.addEventListener('keydown',e=>{ if(e.key==='Enter') nmBtn.click(); });
    nmRow.appendChild(nmInp); nmRow.appendChild(nmBtn); newWrap.appendChild(nmRow);
    body.appendChild(newWrap);
  }
  renderTpls();
}
